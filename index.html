async function load(key, fallback) {
  try {
    const r = await fetch(SB_URL + "/rest/v1/ali4_store?key=eq." + encodeURIComponent(key) + "&select=value", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    if (!r.ok) return fallback;
    const rows = await r.json();
    if (!rows || rows.length === 0) return fallback;
    return JSON.parse(rows[0].value);
  } catch(e) { return fallback; }
}

async function save(key, val) {
  try {
    await fetch(SB_URL + "/rest/v1/ali4_store?key=eq." + encodeURIComponent(key), {
      method: "DELETE",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    await fetch(SB_URL + "/rest/v1/ali4_store", {
      method: "POST",
      headers: {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ key, value: JSON.stringify(val) })
    });
  } catch(e) {}
}

const Btn = ({ children, onClick, variant="primary", sm, disabled, full, style: sx={} }) => {

// Dashboard helpers
function TipRow({ label, value, valueColor, bold, mono }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
      <span style={{color:"#6B7280",fontSize:"0.72em"}}>{label}</span>
      <span style={{color:valueColor||"#111827",fontSize:"0.72em",fontWeight:bold?700:600,fontFamily:mono?"monospace":"inherit",textAlign:"right",wordBreak:"break-word"}}>{value}</span>
    </div>
  );
}

function DashOrderRow({ order, co, onGo, isLast }) {
  const lineItems = order.lineItems || [];
  const total = lineItems.reduce((s,li)=>s+li.qty*li.unitCost,0) || order.total || 0;
  const itemCount = lineItems.length;
  const unitCount = lineItems.reduce((s,li)=>s+(Number(li.qty)||0),0);
  const contact = (co?.contacts||[]).find(c=>c.id===order.contactId) || (co?.contacts||[])[0];
  const isOverdueEta = order.eta && isOverdue(order.eta);
  const statusBg = { Draft:"#1F2937",Confirmed:"#2563EB",Paid:"#7C3AED","In Production":"#D97706",Shipped:"#0284C7",Received:"#0369A1","Awaiting Payment":"#D97706",Cancelled:"#EF4444",Archived:"#1F2937" }[order.status] || "#1F2937";
  const daysStr = (()=>{
    if(!order.eta) return null;
    const days = Math.floor((new Date(order.eta+"T12:00:00") - new Date()) / 86400000);
    if(days < 0) return `${Math.abs(days)} day${Math.abs(days)===1?"":"s"} late`;
    if(days === 0) return "today";
    return `${days} day${days===1?"":"s"}`;
  })();
  return (
    <div onClick={e=>{e.stopPropagation();onGo("orders",null,{openOrderId:order.id});}} style={{display:"grid",gridTemplateColumns:"1fr auto 14px",gap:10,alignItems:"center",padding:"10px 16px",borderBottom:isLast?"none":"2px solid #F1F5F9",cursor:"pointer"}}>
      <div style={{minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
          <span className="adp-ord-ref-wrap">
            <span className="adp-ord-ref" style={{fontSize:"0.78em"}}>{order.ref||"—"}</span>
            <div className="adp-tip" onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:700,color:"#111827",marginBottom:2,fontSize:"0.82em"}}>{order.ref||"—"}{order.label?" · "+order.label:""}</div>
              <div style={{color:"#6B7280",fontSize:"0.72em",marginBottom:10}}>{co?.name}{contact?" · "+contact.name:""}</div>
              <div style={{borderTop:"1px solid #F1F5F9",paddingTop:8,display:"flex",flexDirection:"column",gap:4}}>
                <TipRow label="Status" value={order.status||"Draft"} valueColor={statusBg} bold />
                <TipRow label="Ordered" value={order.date?fmtDate(order.date):"—"} />
                <TipRow label="ETA" value={order.eta?`${fmtDate(order.eta)}${daysStr?" · "+daysStr:""}`:"—"} valueColor={isOverdueEta?"#DC2626":"#111827"} />
                {order.trackingNo&&<TipRow label="Tracking" value={order.trackingNo} mono />}
                {order.carrier&&<TipRow label="Carrier" value={order.carrier} />}
                {itemCount>0&&<TipRow label="Line items" value={`${itemCount} item${itemCount===1?"":"s"}${unitCount?" · "+unitCount+" units":""}`} />}
                {order.notes&&<TipRow label="Notes" value={order.notes} />}
                <TipRow label="Total" value={fmtMoney(total)} valueColor="#2C3E6B" bold />
              </div>
            </div>
          </span>
          <span style={{fontSize:"0.82em",color:"#111827",fontWeight:600}}>{order.label||co?.name||"—"}</span>
          <span style={{background:statusBg,color:"white",fontWeight:700,padding:"2px 7px",borderRadius:99,fontSize:"0.62em",whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:0.3}}>{order.status||"Draft"}</span>
        </div>
        <div style={{fontSize:"0.72em",color:"#6B7280"}}>
          {co?.name||"—"}
          {order.eta&&<span style={{color:isOverdueEta?"#DC2626":"#6B7280",fontWeight:isOverdueEta?700:400}}> · ETA {shortDate(order.eta)}{isOverdueEta?" ⚠":""}</span>}
          {itemCount>0&&<span> · {itemCount} item{itemCount===1?"":"s"}</span>}
        </div>
      </div>
      <span style={{fontSize:"0.82em",color:"#111827",fontWeight:700,whiteSpace:"nowrap"}}>{fmtMoney(total)}</span>
      <span style={{color:"#9CA3AF",fontSize:"0.9em",fontWeight:600}}>›</span>
    </div>
  );
}

// Tasks View
function TasksView({ companies, onUpdateCompany, onGoToCompany }) {
  const [menuOpen, setMenuOpen] = useState(null);
  const [showDone, setShowDone] = useState(false);
  const [expanded, setExpanded] = useState(null);
  // Quick-add state
  const [qaText, setQaText] = useState("");
  const [qaDate, setQaDate] = useState(todayStr());
  const [qaCompanyId, setQaCompanyId] = useState("");
  const [qaDateOpen, setQaDateOpen] = useState(false);
  const [qaVendorOpen, setQaVendorOpen] = useState(false);
  const [qaVendorSearch, setQaVendorSearch] = useState("");
  // Notes draft (per-task local state, flushed on blur)
  const [noteDrafts, setNoteDrafts] = useState({});

  // Close menu/popovers on outside click
  useEffect(() => {
    const onDoc = (e) => {
      if (menuOpen && !e.target.closest("[data-task-menu]")) setMenuOpen(null);
      if (qaDateOpen && !e.target.closest("[data-qa-date]")) setQaDateOpen(false);
      if (qaVendorOpen && !e.target.closest("[data-qa-vendor]")) setQaVendorOpen(false);
    };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [menuOpen, qaDateOpen, qaVendorOpen]);

  const allTasks = companies.flatMap(c => (c.followUps||[]).map(t => ({ ...t, companyName: c.name, companyId: c.id })));

  const updateTask = (task, patch) => {
    const co = companies.find(c => c.id === task.companyId);
    if (!co) return;
    onUpdateCompany({ ...co, followUps: co.followUps.map(t => t.id===task.id ? {...t, ...patch} : t) });
  };
  const toggleDone = (task) => updateTask(task, { done: !task.done });
  const deleteTask = (task) => {
    if (!window.confirm(`Delete task "${task.task}"?`)) return;
    const co = companies.find(c => c.id === task.companyId);
    if (!co) return;
    onUpdateCompany({ ...co, followUps: co.followUps.filter(t => t.id !== task.id) });
    setMenuOpen(null);
    if (expanded === task.id) setExpanded(null);
  };
  const addQuickTask = () => {
    if (!qaText.trim() || !qaCompanyId) return;
    const co = companies.find(c => c.id === qaCompanyId);
    if (!co) return;
    onUpdateCompany({ ...co, followUps: [...(co.followUps || []), { id: uid(), task: qaText.trim(), dueDate: qaDate || "", done: false, contactId: "", notes: "" }] });
    setQaText(""); setQaDate(todayStr());
    // keep selected vendor for batch entry
  };
  const rescheduleTask = (task, daysOffset) => {
    const base = new Date(); base.setHours(12,0,0,0);
    base.setDate(base.getDate() + daysOffset);
    const yyyy = base.getFullYear(), mm = String(base.getMonth()+1).padStart(2,"0"), dd = String(base.getDate()).padStart(2,"0");
    updateTask(task, { dueDate: `${yyyy}-${mm}-${dd}` });
  };

  const open = allTasks.filter(t => !t.done);
  const overdueTasks = open.filter(t => t.dueDate && isOverdue(t.dueDate)).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  const soonTasks = open.filter(t => t.dueDate && isDueSoon(t.dueDate) && !isOverdue(t.dueDate)).sort((a,b)=>(a.dueDate||"").localeCompare(b.dueDate||""));
  const upcomingTasks = open.filter(t => !t.dueDate || (!isOverdue(t.dueDate) && !isDueSoon(t.dueDate))).sort((a,b)=>(a.dueDate||"9999").localeCompare(b.dueDate||"9999"));
  const doneTasks = allTasks.filter(t => t.done).sort((a,b)=>(b.dueDate||"").localeCompare(a.dueDate||""));

  const daysFromNow = (dateStr) => {
    if (!dateStr) return null;
    const d = Math.floor((new Date(dateStr+"T12:00:00") - new Date()) / 86400000);
    if (d < 0) return `${Math.abs(d)}d late`;
    if (d === 0) return "today";
    if (d === 1) return "tomorrow";
    return `${d}d`;
  };
  // Detect order ref like SL-2026-006 in task text
  const findOrderRef = (text) => {
    if (!text) return null;
    const m = text.match(/[A-Z]{1,4}-\d{4}-\d{2,4}/);
    return m ? m[0] : null;
  };
  const qaSelectedVendorName = qaCompanyId ? (companies.find(c=>c.id===qaCompanyId)?.name || "") : "";
  const qaDateLabel = (() => {
    if (!qaDate) return "No date";
    if (qaDate === todayStr()) return "📅 Today";
    const d = Math.floor((new Date(qaDate+"T12:00:00") - new Date()) / 86400000);
    if (d === 1) return "📅 Tomorrow";
    return `📅 ${fmtDate(qaDate)}`;
  })();

  const TaskRow = ({ task, urgency, isLast }) => {
    const dueColor = urgency === "over" ? "#DC2626" : urgency === "soon" ? "#D97706" : "#6B7280";
    const isExpanded = expanded === task.id;
    const orderRef = findOrderRef(task.task);
    const noteValue = noteDrafts[task.id] !== undefined ? noteDrafts[task.id] : (task.notes || "");
    const flushNotes = () => {
      if (noteDrafts[task.id] === undefined) return;
      if ((noteDrafts[task.id] || "") !== (task.notes || "")) updateTask(task, { notes: noteDrafts[task.id] });
      setNoteDrafts(d => { const n={...d}; delete n[task.id]; return n; });
    };
    return (
      <div style={{ borderBottom: isLast ? "none" : "2px solid #F1F5F9", opacity: task.done ? 0.55 : 1 }}>
        <div style={{ display: "grid", gridTemplateColumns: "24px 1fr auto auto 24px 14px", gap: 10, padding: "10px 16px", alignItems: "center", background: isExpanded ? "#F8FAFC" : "white", cursor: "pointer" }}
             onClick={(e)=>{ if(e.target.closest("[data-no-expand]")) return; setExpanded(isExpanded ? null : task.id); }}>
          <input data-no-expand type="checkbox" checked={!!task.done} onChange={()=>toggleDone(task)} onClick={e=>e.stopPropagation()} style={{ cursor: "pointer", accentColor: "#1F2937", width: 16, height: 16, margin: 0 }} />
          <div style={{ minWidth: 0 }}>
            <div style={{ color: "#111827", fontSize: "0.85em", fontWeight: 600, textDecoration: task.done ? "line-through" : "none", wordBreak: "break-word" }}>{task.task}</div>
            <div style={{ fontSize: "0.72em", color: "#6B7280", marginTop: 2 }}>
              {task.companyName}
              {orderRef && <span> · 🔗 {orderRef}</span>}
              {task.notes && !isExpanded && <span> · 📝</span>}
            </div>
          </div>
          <span style={{ fontSize: "0.72em", fontWeight: 700, color: dueColor, whiteSpace: "nowrap" }}>
            {task.dueDate ? (daysFromNow(task.dueDate)) : "no date"}
          </span>
          <span style={{ fontSize: "0.68em", color: "#9CA3AF", whiteSpace: "nowrap" }}>
            {task.dueDate ? fmtDate(task.dueDate) : ""}
          </span>
          <div data-task-menu data-no-expand style={{ position: "relative" }}>
            <button onClick={e=>{e.stopPropagation();setMenuOpen(menuOpen===task.id?null:task.id);}} style={{ background: "transparent", border: "none", cursor: "pointer", padding: "4px 6px", color: "#9CA3AF", fontSize: "1.1em", fontWeight: 700, lineHeight: 1, borderRadius: 4 }} onMouseOver={e=>e.currentTarget.style.background="#F1F5F9"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>⋯</button>
            {menuOpen === task.id && (
              <div style={{ position: "absolute", top: "calc(100% + 4px)", right: 0, zIndex: 50, background: "white", border: "1px solid #E2E8F0", borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", minWidth: 160, overflow: "hidden" }}>
                <button onClick={()=>{onGoToCompany(task.companyId);setMenuOpen(null);}} style={{ display: "block", width: "100%", padding: "9px 14px", background: "transparent", border: "none", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: "0.82em", color: "#111827" }} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>Open vendor</button>
                <button onClick={()=>deleteTask(task)} style={{ display: "block", width: "100%", padding: "9px 14px", background: "transparent", border: "none", borderTop: "1px solid #F1F5F9", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: "0.82em", color: "#DC2626" }} onMouseOver={e=>e.currentTarget.style.background="#FEF2F2"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>Delete task</button>
              </div>
            )}
          </div>
          <span style={{ color: "#9CA3AF", fontSize: "0.85em", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.15s" }}>▾</span>
        </div>

        {isExpanded && (
          <div style={{ background: "#F8FAFC", padding: "12px 16px", borderTop: "1px solid #F1F5F9" }}>
            <div style={{ fontSize: "0.62em", fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Notes</div>
            <textarea
              placeholder="Add notes..."
              value={noteValue}
              onChange={e=>setNoteDrafts(d=>({...d, [task.id]: e.target.value}))}
              onBlur={flushNotes}
              style={{ width: "100%", border: "1px solid #E2E8F0", borderRadius: 6, padding: "7px 9px", fontSize: "0.78em", color: "#374151", fontFamily: "inherit", outline: "none", resize: "vertical", minHeight: 56, marginBottom: 12, background: "white", boxSizing: "border-box" }}
            />

            <div style={{ fontSize: "0.62em", fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 }}>Reschedule</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
              <button onClick={()=>rescheduleTask(task, 0)} style={{ background: "white", border: "1px solid #E2E8F0", borderRadius: 99, padding: "4px 11px", fontSize: "0.72em", fontWeight: 600, color: "#1F2937", cursor: "pointer", fontFamily: "inherit" }}>Today</button>
              <button onClick={()=>rescheduleTask(task, 1)} style={{ background: "white", border: "1px solid #E2E8F0", borderRadius: 99, padding: "4px 11px", fontSize: "0.72em", fontWeight: 600, color: "#1F2937", cursor: "pointer", fontFamily: "inherit" }}>Tomorrow</button>
              <button onClick={()=>rescheduleTask(task, 3)} style={{ background: "white", border: "1px solid #E2E8F0", borderRadius: 99, padding: "4px 11px", fontSize: "0.72em", fontWeight: 600, color: "#1F2937", cursor: "pointer", fontFamily: "inherit" }}>+3 days</button>
              <button onClick={()=>rescheduleTask(task, 7)} style={{ background: "white", border: "1px solid #E2E8F0", borderRadius: 99, padding: "4px 11px", fontSize: "0.72em", fontWeight: 600, color: "#1F2937", cursor: "pointer", fontFamily: "inherit" }}>+1 week</button>
              <input type="date" value={task.dueDate || ""} onChange={e=>updateTask(task, { dueDate: e.target.value })} style={{ background: "white", border: "1px solid #E2E8F0", borderRadius: 99, padding: "4px 11px", fontSize: "0.72em", fontWeight: 600, color: "#1F2937", cursor: "pointer", fontFamily: "inherit" }} />
            </div>

            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <button onClick={()=>onGoToCompany(task.companyId)} style={{ background: "#2C3E6B", color: "white", border: "none", borderRadius: 5, padding: "6px 11px", fontSize: "0.72em", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Open vendor</button>
              <button onClick={()=>deleteTask(task)} style={{ background: "white", color: "#DC2626", border: "1px solid #FEE2E2", borderRadius: 5, padding: "6px 11px", fontSize: "0.72em", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", marginLeft: "auto" }}>Delete task</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  const Section = ({ title, tasks, urgency, accent, countColor }) => {
    if (tasks.length === 0) return null;
    return (
      <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", overflow: "visible" }}>
        <div style={{ background: "#2C3E6B", borderLeft: `5px solid ${accent}`, padding: "10px 16px", display: "flex", alignItems: "center", gap: 12, borderRadius: "12px 12px 0 0" }}>
          <span style={{ fontSize: "1.3em", fontWeight: 700, color: countColor, lineHeight: 1, flexShrink: 0 }}>{tasks.length}</span>
          <span style={{ fontSize: "0.72em", fontWeight: 700, color: "white", textTransform: "uppercase", letterSpacing: 0.7 }}>{title}</span>
        </div>
        <div style={{ borderTop: "1px solid #F1F5F9", display: "flex", flexDirection: "column" }}>
          {tasks.map((t,i) => <TaskRow key={t.id} task={t} urgency={urgency} isLast={i===tasks.length-1} />)}
        </div>
      </div>
    );
  };

  const sortedVendors = [...companies].sort((a,b)=>a.name.localeCompare(b.name));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <div>
          <T size={22} weight={700} color="#2C3E6B" style={{ display: "block", letterSpacing: -0.5, fontSize: "1.3em" }}>Tasks</T>
          <T size={13} color="#6B7280" style={{ marginTop: 2 }}>{overdueTasks.length>0?`${overdueTasks.length} overdue · `:""}{soonTasks.length>0?`${soonTasks.length} due soon · `:""}{open.length} open</T>
        </div>
      </div>

      {/* Quick-add row */}
      {companies.length > 0 && (
        <div style={{ background: "white", borderRadius: 10, border: "2px dashed #C7D2FE", padding: "10px 14px", display: "grid", gridTemplateColumns: "16px 1fr auto auto auto", gap: 10, alignItems: "center" }}>
          <span style={{ width: 14, height: 14, border: "2px solid #C7D2FE", borderRadius: 3 }}></span>
          <input
            placeholder="Add a task..."
            value={qaText}
            onChange={e=>setQaText(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") addQuickTask(); }}
            style={{ border: "none", outline: "none", fontSize: "0.85em", background: "transparent", fontFamily: "inherit", color: "#1F2937", minWidth: 0 }}
          />
          {/* Date chip with popover */}
          <div data-qa-date style={{ position: "relative" }}>
            <button onClick={()=>setQaDateOpen(o=>!o)} style={{ background: "#F1F5F9", border: "none", padding: "4px 9px", borderRadius: 5, fontSize: "0.72em", color: "#6B7280", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>{qaDateLabel}</button>
            {qaDateOpen && (
              <div style={{ position: "absolute", top: "calc(100% + 4px)", right: 0, zIndex: 50, background: "white", border: "1px solid #E2E8F0", borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", padding: 8, minWidth: 180 }}>
                {[
                  {label:"Today", offset:0},
                  {label:"Tomorrow", offset:1},
                  {label:"+3 days", offset:3},
                  {label:"+1 week", offset:7},
                ].map(opt=>(
                  <button key={opt.label} onClick={()=>{ const d=new Date(); d.setHours(12,0,0,0); d.setDate(d.getDate()+opt.offset); const yyyy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); setQaDate(`${yyyy}-${mm}-${dd}`); setQaDateOpen(false); }} style={{ display: "block", width: "100%", padding: "7px 10px", background: "transparent", border: "none", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: "0.78em", color: "#111827", borderRadius: 4 }} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background="transparent"}>{opt.label}</button>
                ))}
                <input type="date" value={qaDate} onChange={e=>{setQaDate(e.target.value); setQaDateOpen(false);}} style={{ width: "100%", marginTop: 4, padding: "6px 8px", border: "1px solid #E2E8F0", borderRadius: 5, fontFamily: "inherit", fontSize: "0.78em" }} />
              </div>
            )}
          </div>
          {/* Vendor chip with popover */}
          <div data-qa-vendor style={{ position: "relative" }}>
            <button onClick={()=>{setQaVendorOpen(o=>!o); setQaVendorSearch("");}} style={{ background: qaCompanyId ? "#E0E7FF" : "#F1F5F9", border: "none", padding: "4px 9px", borderRadius: 5, fontSize: "0.72em", color: qaCompanyId ? "#3730A3" : "#6B7280", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis" }}>{qaSelectedVendorName || "Vendor ▾"}</button>
            {qaVendorOpen && (
              <div style={{ position: "absolute", top: "calc(100% + 4px)", right: 0, zIndex: 50, background: "white", border: "1px solid #E2E8F0", borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,0.12)", minWidth: 240, overflow: "hidden", display: "flex", flexDirection: "column" }}>
                <input
                  autoFocus
                  placeholder="Search vendors..."
                  value={qaVendorSearch}
                  onChange={e=>setQaVendorSearch(e.target.value)}
                  style={{ border: "none", borderBottom: "1px solid #E2E8F0", padding: "9px 12px", fontFamily: "inherit", fontSize: "0.82em", outline: "none", color: "#111827" }}
                />
                <div style={{ maxHeight: 240, overflowY: "auto" }}>
                  {(()=>{
                    const q = qaVendorSearch.trim().toLowerCase();
                    const filtered = q ? sortedVendors.filter(c=>c.name.toLowerCase().includes(q)) : sortedVendors;
                    if (filtered.length === 0) {
                      return <div style={{ padding: "12px 14px", color: "#9CA3AF", fontSize: "0.78em", fontStyle: "italic", textAlign: "center" }}>No vendors match "{qaVendorSearch}"</div>;
                    }
                    return filtered.map(c=>(
                      <button key={c.id} onClick={()=>{setQaCompanyId(c.id); setQaVendorOpen(false); setQaVendorSearch("");}} style={{ display: "block", width: "100%", padding: "8px 12px", background: c.id===qaCompanyId?"#F0F4FF":"transparent", border: "none", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: "0.82em", color: "#111827" }} onMouseOver={e=>{if(c.id!==qaCompanyId)e.currentTarget.style.background="#F8FAFC";}} onMouseOut={e=>{if(c.id!==qaCompanyId)e.currentTarget.style.background="transparent";}}>{c.name}</button>
                    ));
                  })()}
                </div>
              </div>
            )}
          </div>
          <button onClick={addQuickTask} disabled={!qaText.trim() || !qaCompanyId} style={{ background: (!qaText.trim() || !qaCompanyId) ? "#9CA3AF" : "#2C3E6B", color: "white", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: "0.78em", fontWeight: 600, cursor: (!qaText.trim() || !qaCompanyId) ? "not-allowed" : "pointer", fontFamily: "inherit" }}>Add</button>
        </div>
      )}

      {open.length === 0 && doneTasks.length === 0 && (
        <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", textAlign: "center", padding: "60px 20px", color: "#6B7280", fontSize: "0.9em" }}>
          No tasks yet. Add one above or inside a vendor record.
        </div>
      )}

      <Section title="Overdue" tasks={overdueTasks} urgency="over" accent="#EF4444" countColor="#F87171" />
      <Section title="Due Soon" tasks={soonTasks} urgency="soon" accent="#F59E0B" countColor="#FCD34D" />
      <Section title="Upcoming" tasks={upcomingTasks} urgency="none" accent="#6B7280" countColor="#D1D5DB" />

      {doneTasks.length > 0 && (
        <div style={{ background: "white", borderRadius: 12, border: "1px solid #E2E8F0", overflow: "visible", opacity: showDone ? 1 : 0.75 }}>
          <div onClick={()=>setShowDone(s=>!s)} style={{ padding: "10px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer", borderBottom: showDone ? "1px solid #F1F5F9" : "none" }}>
            <span style={{ fontSize: "0.72em", fontWeight: 700, color: "#6B7280", textTransform: "uppercase", letterSpacing: 0.5 }}>{doneTasks.length} Completed</span>
            <span style={{ color: "#9CA3AF", marginLeft: "auto", fontSize: "0.8em" }}>{showDone ? "▲" : "▼"}</span>
          </div>
          {showDone && (
            <div style={{ display: "flex", flexDirection: "column" }}>
              {doneTasks.map((t,i) => <TaskRow key={t.id} task={t} urgency="done" isLast={i===doneTasks.length-1} />)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Ideas
function Ideas({ ideas, setIdeas, allCategories }) {
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [filterCat, setFilterCat] = useState("all");
  const [filterPri, setFilterPri] = useState("all");
  const [showDone, setShowDone] = useState(false);
  const addIdea = (idea) => setIdeas(p => [{ ...idea, id: uid(), done: false, createdAt: todayStr() }, ...p]);
  const updateIdea = (id, patch) => setIdeas(p => p.map(x => x.id===id?{...x,...patch}:x));
  const deleteIdea = (id) => setIdeas(p => p.filter(x => x.id!==id));
  const filtered = ideas.filter(i => (filterCat==="all"||i.category===filterCat)&&(filterPri==="all"||i.priority===filterPri)&&(showDone||!i.done))
    .sort((a,b) => { if(a.done&&!b.done)return 1; if(!a.done&&b.done)return -1; const pri={high:0,medium:1,low:2}; return (pri[a.priority]??1)-(pri[b.priority]??1); });
  const openCount = ideas.filter(i=>!i.done).length;
  const highCount = ideas.filter(i=>!i.done&&i.priority==="high").length;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div><T size={22} weight={700} color="#2C3E6B" style={{ display: "block", letterSpacing: -0.5 }}>Ideas</T><T size={13} color="#111827">{openCount} open · {highCount} high priority</T></div>
        <Btn onClick={()=>setModal(true)}>+ Add Idea</Btn>
      </div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{ flex:1,minWidth:130,border:"1px solid #E2E8F0",borderRadius:8,padding:"9px 10px",fontFamily:"inherit",background:"white",outline:"none" }}><option value="all">All Categories</option>{allCategories.map(c=><option key={c} value={c}>{c}</option>)}</select>
        <select value={filterPri} onChange={e=>setFilterPri(e.target.value)} style={{ flex:1,minWidth:120,border:"1px solid #E2E8F0",borderRadius:8,padding:"9px 10px",fontFamily:"inherit",background:"white",outline:"none" }}><option value="all">All Priorities</option>{PRIORITY.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</select>
        <button onClick={()=>setShowDone(d=>!d)} style={{ border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 12px",fontFamily:"inherit",background:showDone?"#1F2937":"white",color:showDone?"white":"#1F2937",cursor:"pointer",fontWeight:600 }}>{showDone?"Hide Done":"Show Done"}</button>
      </div>
      <div style={{ background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden" }}>
        <div style={{ background:"#2C3E6B",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
          <span style={{ fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em" }}>Ideas</span>
          <span style={{ background:"rgba(74,222,128,0.2)",color:"#4ADE80",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em" }}>{filtered.length} open</span>
        </div>
        {filtered.length===0&&<div style={{ textAlign:"center",padding:"60px 0",color:"#111827" }}>{ideas.length===0?"No ideas yet. Add your first one.":"Nothing matches your filters."}</div>}
        {["high","medium","low"].map(pri => {
          const bucket = filtered.filter(i=>i.priority===pri);
          if(bucket.length===0)return null;
          const p = PRI_MAP[pri];
          const priBg = pri==="high"?"#FEE2E2":pri==="medium"?"#FEF3C7":"#F1F5F9";
          const priColor = pri==="high"?"#DC2626":pri==="medium"?"#D97706":"#6B7280";
          return bucket.map((idea,i) => (
            <div key={idea.id} style={{ borderBottom:"1px solid #F1F5F9",padding:"12px 20px",display:"flex",alignItems:"flex-start",gap:12,opacity:idea.done?0.5:1 }}>
              <input type="checkbox" checked={idea.done} onChange={()=>updateIdea(idea.id,{done:!idea.done})} style={{ marginTop:3,flexShrink:0 }} />
              <div style={{ flex:1,minWidth:0 }}>
                <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4 }}>
                  <span style={{ background:priBg,color:priColor,fontSize:"0.65em",fontWeight:700,padding:"2px 7px",borderRadius:99,textTransform:"uppercase",whiteSpace:"nowrap" }}>{p.label}</span>
                  <span style={{ fontWeight:700,color:"#111827" }}>{idea.title}</span>
                </div>
                <div style={{ display:"flex",gap:6,flexWrap:"wrap",alignItems:"center" }}>
                  {idea.category&&<span style={{ background:"#F1F5F9",color:"#374151",fontSize:"0.72em",padding:"2px 7px",borderRadius:99 }}>{idea.category}</span>}
                  {idea.createdAt&&<span style={{ color:"#9CA3AF",fontSize:"0.72em" }}>{fmtDate(idea.createdAt)}</span>}
                </div>
                {idea.note&&<div style={{ color:"#374151",fontSize:"0.82em",marginTop:4 }}>{idea.note}</div>}
              </div>
              <div style={{ display:"flex",gap:4,flexShrink:0 }}>
                <button onClick={()=>setEditId(idea.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",padding:"2px 4px",fontSize:16 }}>✎</button>
                <button onClick={()=>deleteIdea(idea.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"#EF4444",padding:"2px 4px",fontSize:16 }}>×</button>
              </div>
            </div>
          ));
        })}
      </div>
      {modal&&<IdeaModal allCategories={allCategories} onSave={idea=>{addIdea(idea);setModal(false);}} onClose={()=>setModal(false)} />}
      {editId&&<IdeaModal allCategories={allCategories} existing={ideas.find(i=>i.id===editId)} onSave={patch=>{updateIdea(editId,patch);setEditId(null);}} onClose={()=>setEditId(null)} editMode />}
    </div>
  );
}

function IdeaCard({ idea, onToggle, onDelete, onEdit, onUpdate }) {
  const [expanded, setExpanded] = useState(false);
  const [editNote, setEditNote] = useState(false);
  const [noteVal, setNoteVal] = useState(idea.note||"");
  const p = PRI_MAP[idea.priority]||PRI_MAP.medium;
  return (
    <div style={{ background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden",opacity:idea.done?0.6:1 }}>
      <div style={{ height:4,background:p.bg }} />
      <div style={{ padding:"12px 14px" }}>
        <Row align="flex-start" gap={10}>
          <input type="checkbox" checked={idea.done} onChange={onToggle} style={{ marginTop:3,cursor:"pointer",accentColor:"#1F2937",flexShrink:0,width:16,height:16 }} />
          <div style={{ flex:1,minWidth:0 }}>
            <T size={14} weight={600} color="#111827" style={{ textDecoration:idea.done?"line-through":"none",display:"block" }}>{idea.title}</T>
            <Row gap={6} wrap style={{ marginTop:5 }}>
              {idea.category&&<CatTag cat={idea.category} small />}
              <span style={{ background:p.bg,color:"white",borderRadius:99,padding:"1px 8px",fontWeight:700 }}>{p.label}</span>
              <T size={13} color="#111827">{fmtDate(idea.createdAt)}</T>
            </Row>
            {idea.note&&!expanded&&<T size={13} color="#111827" style={{ display:"block",marginTop:5 }} lines={1}>{idea.note}</T>}
          </div>
          <div style={{ display:"flex",gap:4,flexShrink:0 }}>
            <button onClick={onEdit} style={{ background:"none",border:"none",cursor:"pointer",color:"#111827",padding:"2px 4px" }}>✏</button>
            <button onClick={onDelete} style={{ background:"none",border:"none",cursor:"pointer",color:"#111827",padding:"2px 4px" }}>×</button>
          </div>
        </Row>
        {expanded&&(
          <div style={{ marginTop:10,paddingTop:10,borderTop:"1px solid #F1F5F9" }}>
            {editNote?(
              <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                <textarea value={noteVal} onChange={e=>setNoteVal(e.target.value)} rows={3} style={{ border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",resize:"vertical",outline:"none",width:"100%",boxSizing:"border-box" }} />
                <Row gap={6}><Btn sm onClick={()=>{onUpdate({note:noteVal});setEditNote(false);}}>Save</Btn><Btn sm variant="outline" onClick={()=>setEditNote(false)}>Cancel</Btn></Row>
              </div>
            ):(
              <div onClick={()=>setEditNote(true)} style={{ cursor:"text" }}>
                {idea.note?<T size={13} color="#111827" style={{ display:"block",lineHeight:1.6 }}>{idea.note}</T>:<T size={13} color="#111827" style={{ fontStyle:"italic" }}>+ Add a note…</T>}
              </div>
            )}
          </div>
        )}
        <button onClick={()=>setExpanded(e=>!e)} style={{ background:"none",border:"none",cursor:"pointer",color:"#111827",fontFamily:"inherit",padding:"6px 0 0 0" }}>{expanded?"▲ Less":"▼ Notes"}</button>
      </div>
    </div>
  );
}

function IdeaModal({ allCategories, onSave, onClose, existing, editMode }) {
  const [f,setF]=useState({title:existing?.title||"",category:existing?.category||allCategories[0]||"",priority:existing?.priority||"medium",note:existing?.note||""});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  return (
    <Modal title={editMode?"Edit Idea":"Add Idea"} onClose={onClose}>
      <Inp label="Idea / Product to Explore" value={f.title} onChange={e=>u("title",e.target.value)} placeholder="e.g. Look into silk scarves for fall" />
      <Grid><Sel label="Category" value={f.category} options={allCategories} onChange={e=>u("category",e.target.value)} /><Sel label="Priority" value={f.priority} options={PRIORITY.map(p=>({v:p.id,l:p.label}))} onChange={e=>u("priority",e.target.value)} /></Grid>
      <Ta label="Notes (optional)" value={f.note} onChange={e=>u("note",e.target.value)} placeholder="Vendors to check, price range, inspiration…" rows={3} />
      <Row gap={8}><Btn onClick={()=>{onSave(f);onClose();}} disabled={!f.title}>{editMode?"Save Changes":"Add Idea"}</Btn><Btn variant="outline" onClick={onClose}>Cancel</Btn></Row>
    </Modal>
  );
}

// Company List
function CompanyList({ companies, onSelect, onAdd, onImport, onBulkDelete, initialFilter, onClearFilter }) {
  const [search,setSearch]=useState("");
  
  const [waitingF,setWaitingF]=useState(initialFilter?.waitingOn||false);
  const [catF,setCatF]=useState("all");
  const allCats=[...new Set(companies.flatMap(c=>c.categories||[]))].sort();
  const filtered=companies.filter(c=>{const q=search.toLowerCase();const nameMatch=c.name.toLowerCase().includes(q)||(c.alibabaName||"").toLowerCase().includes(q)||(c.contacts||[]).some(ct=>ct.name.toLowerCase().includes(q));const matchWaiting=!waitingF||(c.conversations||[]).some(cv=>cv.waitingOn==="They're waiting on me");return nameMatch&&(catF==="all"||(c.categories||[]).includes(catF))&&matchWaiting;});
  const [manageMode,setManageMode]=useState(false);
  const [selected,setSelected]=useState([]);
  const toggleSelect=(id)=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const clearSelect=()=>setSelected([]);
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
      <Row style={{justifyContent:"space-between",alignItems:"center"}}>
        <T size={22} weight={700} color="#2C3E6B" style={{ letterSpacing:-0.5 }}>Vendors</T>
        <Row gap={8}>
          {!manageMode
            ? <><Btn variant="outline" onClick={()=>setManageMode(true)}>Manage</Btn><Btn variant="outline" onClick={onImport}>Import</Btn><Btn onClick={onAdd}>+ New Vendor</Btn></>
            : <><Btn variant="danger" onClick={()=>{if(selected.length>0&&window.confirm("Delete "+selected.length+" vendor"+(selected.length>1?"s":"")+"?"))onBulkDelete(selected);setManageMode(false);clearSelect();}} disabled={selected.length===0}>Delete ({selected.length})</Btn><Btn variant="outline" onClick={()=>{setManageMode(false);clearSelect();}}>Done</Btn></>
          }
        </Row>
      </Row>
      {manageMode&&(
        <div style={{background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
          <T size={13} color="#92400E" weight={600}>Tap checkboxes to select vendors to delete.</T>
          <Row gap={8}>
            <button onClick={()=>setSelected(filtered.map(c=>c.id))} style={{background:"none",border:"1px solid #92400E",borderRadius:6,padding:"3px 10px",color:"#92400E",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>All</button>
            <button onClick={clearSelect} style={{background:"none",border:"1px solid #92400E",borderRadius:6,padding:"3px 10px",color:"#92400E",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>None</button>
          </Row>
        </div>
      )}
      {waitingF&&(
        <div style={{ display:"flex",alignItems:"center",gap:8,background:"#2C3E6B",borderRadius:9,padding:"8px 12px" }}>
          <T size={13} color="white" weight={600}>Showing: Waiting on me</T>
          <button onClick={()=>{setWaitingF(false);if(onClearFilter)onClearFilter();}} style={{ background:"rgba(255,255,255,0.15)",border:"none",borderRadius:6,padding:"2px 8px",color:"white",cursor:"pointer",fontFamily:"inherit",fontWeight:600 }}>Clear x</button>
        </div>
      )}
      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search companies or contacts…" style={{ border:"1.5px solid #E2E8F0",borderRadius:10,padding:"9px 12px",fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box",background:"white" }} />
        <Row gap={8} wrap>
          {allCats.length>0&&<select value={catF} onChange={e=>setCatF(e.target.value)} style={{ flex:1,minWidth:120,border:"1px solid #E2E8F0",borderRadius:8,padding:"9px 10px",fontFamily:"inherit",background:"white",outline:"none" }}><option value="all">All Categories</option>{allCats.map(c=><option key={c} value={c}>{c}</option>)}</select>}
        </Row>
      </div>
      {filtered.length===0&&<div style={{ textAlign:"center",padding:"60px 0",color:"#111827" }}>No vendors found.</div>}
      <div style={{ background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden" }}>
        <div style={{ background:"#2C3E6B",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
          <span style={{ fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em" }}>Vendors</span>
          <span style={{ background:"rgba(74,222,128,0.2)",color:"#4ADE80",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em" }}>{filtered.length} vendors</span>
        </div>
        {filtered.map(co=>{
          const primary=(co.contacts||[]).find(c=>c.primary)||(co.contacts||[])[0];
          const openTasks=(co.followUps||[]).filter(t=>!t.done);
          const overdueTasks=openTasks.filter(t=>isOverdue(t.dueDate));
          const totalSpent=(co.orders||[]).reduce((s,o)=>s+(o.lineItems||[]).reduce((ss,li)=>ss+li.qty*li.unitCost,0),0);
          const activeOrders=(co.orders||[]).filter(o=>o.status!=="Received");
          const lastConvo=[...(co.conversations||[])].sort((a,b)=>b.date>a.date?1:-1)[0];
          return (
            <div key={co.id} onClick={()=>manageMode?toggleSelect(co.id):onSelect(co.id)} style={{ borderBottom:"2px solid #E8ECF4",padding:"14px 20px",background:manageMode&&selected.includes(co.id)?"#FEF2F2":"white",cursor:"pointer",borderLeft:co.redFlag?"3px solid #EF4444":"none" }} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background=manageMode&&selected.includes(co.id)?"#FEF2F2":"white"}>
              <Row align="flex-start" gap={12}>
                {manageMode&&(
                  <div onClick={e=>{e.stopPropagation();toggleSelect(co.id);}} style={{display:"flex",alignItems:"center",justifyContent:"center",width:24,height:24,flexShrink:0,marginTop:9,cursor:"pointer"}}>
                    <div style={{width:20,height:20,borderRadius:5,border:"2px solid "+(selected.includes(co.id)?"#EF4444":"#374151"),background:selected.includes(co.id)?"#EF4444":"white",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {selected.includes(co.id)&&<span style={{color:"white",fontWeight:700,lineHeight:1}}>✓</span>}
                    </div>
                  </div>
                )}
                <Avatar name={co.name} size={42} />
                <div style={{ flex:1,minWidth:0 }}>
                  <Row gap={8} wrap><T size={16} weight={700} color="#111827">{co.name}</T>{co.redFlag&&<T size={13} color="#EF4444" weight={700}>🚩</T>}</Row>
                  {co.alibabaName&&co.alibabaName!==co.name&&<T size={13} color="#111827" style={{ display:"block",marginTop:1 }}>{co.alibabaName}</T>}
                  {primary&&<Row gap={6} style={{ marginTop:6 }}><Avatar name={primary.name} size={18} /><T size={13} color="#111827">{primary.name}{primary.title?` · ${primary.title}`:""}</T>{(co.contacts||[]).length>1&&<T size={13} color="#111827">+{co.contacts.length-1} more</T>}</Row>}
                  <Row gap={4} wrap style={{ marginTop:6 }}>{(co.categories||[]).slice(0,4).map(c=><CatTag key={c} cat={c} small />)}{(co.categories||[]).length>4&&<T size={13} color="#111827">+{co.categories.length-4}</T>}</Row>
                  <Row gap={14} wrap style={{ marginTop:8 }}>
                    {totalSpent>0&&<T size={13} color="#111827" weight={600}>{fmtMoney(totalSpent)} spent</T>}
                    {activeOrders.length>0&&<T size={13} color="#111827">{activeOrders.length} active order{activeOrders.length>1?"s":""}</T>}
                    {overdueTasks.length>0&&<T size={13} color="#EF4444" weight={600}>⚠ {overdueTasks.length} overdue</T>}
                    {lastConvo&&<T size={13} color="#111827">Last contact {fmtDate(lastConvo.date)}</T>}
                  </Row>
                </div>
                <T size={16} color="#111827" weight={700}>›</T>
              </Row>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Company Detail

            </Row>
          </div>
        ))}
      </div>

      {tab==="orders"&&(
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          {allOrders.length===0&&<div style={{ color:"#111827",textAlign:"center",padding:"40px 0" }}>No orders yet.</div>}
          {[...allOrders].sort((a,b)=>b.date>a.date?1:-1).map(o=>{

                    <Row gap={4} wrap style={{ marginTop:8 }}>{cats.map(c=><CatTag key={c} cat={c} small />)}</Row>

                      {(o.lineItems||[]).map(li=>(
                        <div key={li.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0" }}>
                          <div style={{ flex:1,minWidth:0 }}><T size={13} color="#111827">{li.description}</T><CatTag cat={li.category} small /></div>
                          <div style={{ textAlign:"right",flexShrink:0,marginLeft:10 }}><T size={13} color="#111827">{li.qty} × {fmtMoney(li.unitCost)}</T><T size={13} weight={600} color="#111827" style={{ display:"block" }}>{fmtMoney(li.qty*li.unitCost)}</T></div>
                        </div>
                      ))}
                    </div>
                    {o.trackingNo&&<div style={{ marginTop:8,color:"#111827" }}>Tracking: <T size={13} color="#111827" mono>{o.trackingNo}</T>{o.carrier&&` via ${o.carrier}`}{o.eta&&` · ETA ${fmtDate(o.eta)}`}</div>}
                    {o.poFile&&<a href={o.poFile.data} download={o.poFile.name} style={{ display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:"#F1F5F9",borderRadius:6,padding:"3px 8px",color:"#111827",textDecoration:"none",fontWeight:500 }}>📄 {o.poFile.name}</a>}
                  </div>
                  <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                    <Btn sm variant="outline" onClick={()=>setModal({type:"editOrderStatus",order:o})}>Status</Btn>
                    <Btn sm variant="danger" onClick={()=>upd({orders:(co.orders||[]).filter(x=>x.id!==o.id)})}>×</Btn>
                  </div>
                </Row>
              </Card>
            );
          })}
          <Btn variant="outline" full onClick={()=>setModal("addOrder")}>+ Add Order</Btn>
        </div>
      )}
      {tab==="conversations"&&(
        <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
          {allConvos.length===0&&<div style={{ color:"#111827",textAlign:"center",padding:"40px 0" }}>No conversations logged yet.</div>}
          {[...allConvos].sort((a,b)=>b.date>a.date?1:-1).map(c=>(
            <Card key={c.id}>
              <Row align="flex-start" gap={12}>
                {c.contactId&&<Avatar name={contactName(c.contactId)} size={32} />}
                <div style={{ flex:1,minWidth:0 }}>
                  <Row gap={8} wrap>
                    <T size={13} color="#111827">{fmtDate(c.date)}</T>
                    {c.channel&&<span style={{ background:"#F3F4F6",color:"#111827",borderRadius:99,padding:"1px 7px" }}>{c.channel}</span>}
                    {c.waitingOn&&c.waitingOn!=="N/A"&&<span style={{ fontWeight:600,background:"#1F2937",color:"white",borderRadius:99,padding:"1px 7px" }}>{c.waitingOn}</span>}
                  </Row>
                  <T size={13} color="#111827" style={{ display:"block",marginTop:4,lineHeight:1.5 }}>{c.summary}</T>
                  {c.promised&&<T size={13} color="#111827" style={{ display:"block",marginTop:4 }}>✓ Promised: {c.promised}</T>}

      {tab==="tasks"&&(
        <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
          {allTasks.length===0&&<div style={{ color:"#111827",textAlign:"center",padding:"40px 0" }}>No tasks yet.</div>}
          {[...allTasks].sort((a,b)=>{if(a.done&&!b.done)return 1;if(!a.done&&b.done)return -1;return(a.dueDate||"9999")<(b.dueDate||"9999")?-1:1;}).map(t=>{
            const over=!t.done&&isOverdue(t.dueDate);const soon=!t.done&&isDueSoon(t.dueDate);
            return <div key={t.id} style={{ background:"white",border:"1px solid #E2E8F0",borderLeft:`4px solid ${over?"#EF4444":soon?"#F59E0B":"#E2E8F0"}`,borderRadius:12,padding:"11px 14px",display:"flex",gap:10,alignItems:"flex-start" }}><input type="checkbox" checked={t.done} onChange={e=>upd({followUps:(co.followUps||[]).map(x=>x.id===t.id?{...x,done:e.target.checked}:x)})} style={{ marginTop:2,cursor:"pointer",accentColor:"#1F2937",flexShrink:0 }} /><div style={{ flex:1,minWidth:0 }}><T size={13} weight={500} color={t.done?"#1F2937":"#111827"} style={{ textDecoration:t.done?"line-through":"none" }}>{t.task}</T>{t.dueDate&&<T size={13} color={over?"#EF4444":soon?"#F59E0B":"#1F2937"} style={{ display:"block",marginTop:2 }}>{over?"⚠ Overdue · ":soon?"⏰ Soon · ":""}{fmtDate(t.dueDate)}</T>}</div><Btn sm variant="danger" onClick={()=>upd({followUps:(co.followUps||[]).filter(x=>x.id!==t.id)})}>×</Btn></div>;

        </div>

      {tab==="images"&&(
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>

          <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:10 }}>

                <img src={img.src} alt={img.name} style={{ width:"100%",height:120,objectFit:"cover",borderRadius:10,border:"1px solid #F0F0F0",display:"block" }} />
                <input value={img.note} onChange={e=>upd({images:(co.images||[]).map(i=>i.id===img.id?{...i,note:e.target.value}:i)})} placeholder="Note…" style={{ width:"100%",marginTop:4,border:"1px solid #E2E8F0",borderRadius:6,padding:"4px 6px",fontFamily:"inherit",boxSizing:"border-box",outline:"none" }} />
                <button onClick={()=>upd({images:(co.images||[]).filter(i=>i.id!==img.id)})} style={{ position:"absolute",top:5,right:5,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",color:"white",display:"flex",alignItems:"center",justifyContent:"center" }}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}
      {modal==="addContact"&&<ContactModal onAdd={c=>{upd({contacts:[...(co.contacts||[]),{...c,id:uid()}]});setModal(null);}} onClose={()=>setModal(null)} hasContacts={(co.contacts||[]).length>0} />}
      {modal==="addConvo"&&<ConvoModal contacts={co.contacts||[]} onAdd={c=>{upd({conversations:[...(co.conversations||[]),{...c,id:uid()}]});setModal(null);}} onClose={()=>setModal(null)} />}
      {modal==="addOrder"&&<OrderModal contacts={co.contacts||[]} allCategories={allCategories} onAdd={o=>{upd({orders:[...(co.orders||[]),{...o,id:uid()}]});setModal(null);}} onClose={()=>setModal(null)} />}
      {modal==="addTask"&&<TaskModal contacts={co.contacts||[]} onAdd={t=>{upd({followUps:[...(co.followUps||[]),{...t,id:uid(),done:false}]});setModal(null);}} onClose={()=>setModal(null)} />}
      {modal?.type==="editOrderStatus"&&<EditStatusModal order={modal.order} onSave={updated=>{upd({orders:(co.orders||[]).map(o=>o.id===updated.id?updated:o)});setModal(null);}} onClose={()=>setModal(null)} />}
    </div>
  );
}

      <Grid><Inp label="Tracking #" value={f.trackingNo} onChange={e=>u("trackingNo",e.target.value)} /><Inp label="Carrier" value={f.carrier} onChange={e=>u("carrier",e.target.value)} /></Grid>
      <Inp label="ETA" type="date" value={f.eta} onChange={e=>u("eta",e.target.value)} />

    </Modal>
  );
}

// ── IMPORT VENDORS MODAL ──────────────────────────────────────────────────────
function ImportVendorsModal({ onImport, onClose, allCategories }) {
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState([]);
  const [parsing,setParsing]=useState(false);
  const [error,setError]=useState("");
  const [done,setDone]=useState(false);

  const parseFile = async (f) => {
    setParsing(true);setError("");setPreview([]);
    try {
      await new Promise((res,rej)=>{
        if(window.XLSX){res();return;}
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        s.onload=res;s.onerror=rej;
        document.head.appendChild(s);
      });
      const buf=await f.arrayBuffer();
      const wb=window.XLSX.read(buf,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=window.XLSX.utils.sheet_to_json(ws,{defval:""});
      const dataRows=rows.filter(r=>{const name=(r["Company Name *"]||r["Company Name"]||"").trim();return name&&!name.includes("Required")&&!name.includes("e.g.");});
      const vendors=dataRows.map(r=>{
        const contactName=(r["Contact Name"]||"").trim();
        const contacts=contactName?[{id:uid(),name:contactName,email:(r["Contact Email"]||"").trim(),phone:(r["Contact Phone"]||"").trim(),whatsapp:(r["Contact WhatsApp"]||"").trim(),wechat:(r["Contact WeChat"]||"").trim(),alibabaHandle:(r["Contact Alibaba Handle"]||"").trim(),primary:true,title:""}]:[];
        return {id:uid(),name:(r["Company Name *"]||r["Company Name"]||"").trim(),alibabaName:"",alibabaUrl:(r["Alibaba Store URL"]||"").trim(),address:(r["Address"]||"").trim(),city:(r["City"]||"").trim(),country:(r["Country"]||"China").trim(),stage:"",rating:3,redFlag:false,minOrder:(r["Min Order Policy"]||"").trim(),paymentTerms:"",categories:(r["Categories"]||"").split(",").map(c=>c.trim()).filter(Boolean),notes:(r["Notes"]||"").trim(),contacts,orders:[],conversations:[],followUps:[],images:[]};
      }).filter(v=>v.name);
      setPreview(vendors);
    } catch(err) { setError("Could not read file. Make sure it is an .xlsx file."); }
    setParsing(false);
  };

  return (
    <Modal title="Import Vendors" onClose={onClose} wide>
      {!done ? (
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:file?"#2C3E6B":"white",border:"1.5px dashed "+(file?"#2C3E6B":"#374151"),borderRadius:10,padding:"14px",cursor:"pointer",color:file?"white":"#1F2937",fontWeight:600,fontFamily:"inherit"}}>
            <input type="file" accept=".xlsx" style={{display:"none"}} onChange={e=>{if(e.target.files[0]){setFile(e.target.files[0]);parseFile(e.target.files[0]);}}} />
            {file?"📊 "+file.name:"📊 Choose .xlsx file"}
          </label>
          {parsing&&<T size={13} color="#111827">Reading file...</T>}
          {error&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"8px 12px"}}><T size={13} color="#B91C1C">{error}</T></div>}
          {preview.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{background:"#ECFDF5",border:"1px solid #A7F3D0",borderRadius:10,padding:"10px 14px"}}>

const SHIPPO_KEY = "shippo_live_580b507fb6bea4d8bef9703bc135f42cab86f307";

function detectCarrier(t) {
  if(!t) return "usps";
  t = t.trim().toUpperCase().replace(/\s/g,"");
  if(/^1Z/.test(t)) return "ups";
  if(/^(JD|JVGL)/.test(t)) return "dhl_express";
  if(/^[0-9]{20,22}$/.test(t)) return "usps";
  if(/^[0-9]{12,15}$/.test(t)) return "fedex";
  if(/^[A-Z]{2}[0-9]{9}[A-Z]{2}$/.test(t)) return "usps";
  return "dhl_express";
}

function etaColor(eta) {
  if(!eta) return {bg:"#F1F5F9",color:"#111827",label:"No ETA"};
  var days = Math.ceil((new Date(eta) - new Date()) / 86400000);
  if(days < 0) return {bg:"#FEF2F2",color:"#EF4444",label:"Overdue"};
  if(days === 0) return {bg:"#ECFDF5",color:"#059669",label:"Today!"};
  if(days <= 7) return {bg:"#EFF6FF",color:"#2563EB",label:"Within 7 days"};
  if(days <= 30) return {bg:"#FFFBEB",color:"#D97706",label:"Within 30 days"};
  return {bg:"#F1F5F9",color:"#111827",label:days+" days away"};
}

function WeekCalendar({ companies, onGo }) {
  const allOrders = companies.flatMap(co=>(co.orders||[]).map(o=>({...o,companyName:co.name,companyId:co.id})));
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    days.push(d);
  }
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const ordersForDay = (d) => {
    const ds = d.toISOString().slice(0,10);
    return allOrders.filter(o=>o.eta===ds && o.status!=="Cancelled" && o.status!=="Archived");
  };
  const overdueOrders = allOrders.filter(o=>{
    if(!o.eta||o.status==="Received"||o.status==="Cancelled"||o.status==="Archived") return false;
    const eta = new Date(o.eta+"T12:00:00");
    return eta < today;
  });
  const totalArriving = days.reduce((s,d)=>s+ordersForDay(d).length,0);

  return (
    <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden"}}>
      <div style={{background:"#2C3E6B",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>

          <span style={{fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em"}}>Arriving This Week</span>
          {totalArriving>0&&<span style={{background:"rgba(74,222,128,0.2)",color:"#4ADE80",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>{totalArriving} shipment{totalArriving!==1?"s":""}</span>}
          {overdueOrders.length>0&&<span style={{background:"rgba(239,68,68,0.2)",color:"#F87171",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>⚠ {overdueOrders.length} overdue</span>}
        </div>
        <span style={{fontSize:"0.72em",color:"rgba(255,255,255,0.5)"}}>
          {days[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – {days[6].toLocaleDateString("en-US",{month:"short",day:"numeric"})}
        </span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))"}}>
        {days.map((d,i)=>{
          const todayStr2=today.toISOString().slice(0,10);
          const isToday=d.toISOString().slice(0,10)===todayStr2;
          const isWeekend=d.getDay()===0||d.getDay()===6;
          const dayOrders=ordersForDay(d);
          return (
            <div key={i} style={{borderRight:i<6?"0.5px solid #F1F5F9":"none",background:isToday?"#2C3E6B":isWeekend?"#F9FAFB":"white"}}>
              <div style={{padding:"6px 6px 4px",textAlign:"center",borderBottom:"0.5px solid "+(isToday?"rgba(255,255,255,0.15)":"#F1F5F9")}}>
                <div style={{fontSize:"0.65em",fontWeight:600,color:isToday?"#4ADE80":isWeekend?"#D1D5DB":"#9CA3AF",textTransform:"uppercase",letterSpacing:0.5}}>{DAY_NAMES[d.getDay()]}</div>
                <div style={{fontSize:"0.9em",fontWeight:700,color:isToday?"white":isWeekend?"#D1D5DB":"#374151",marginTop:1}}>

                </div>

        })}
      </div>
      {overdueOrders.length>0&&(
        <div style={{borderTop:"0.5px solid #FEE2E2",background:"#FEF2F2",padding:"8px 16px",display:"flex",flexDirection:"column",gap:3}}>

}
