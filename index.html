                      }}
                      onMouseLeave={()=>{const p=document.getElementById("imgpop_"+catalog.id+"_"+i);if(p)p.remove();}}
                      style={{width:80,height:80,flexShrink:0,background:"white",borderRadius:6,border:"1px solid #E2E8F0",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative"}}>
                      <img src={img} alt="" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}} />
                      {i===5 && imgs.length>6 && (
                        <div style={{position:"absolute",inset:0,background:"rgba(44,62,107,0.7)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:"0.8em"}}>+{imgs.length-6}</div>
                      )}
                    </div>
                  ))}
                </div>
              )}
              {imgs.length === 0 && (
                <div style={{height:100,background:"#F8FAFC",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",borderBottom:"1px solid #E2E8F0"}} onClick={() => setSelected(catalog.id)}>
                  <T size={13} color="#111827">No images yet — tap Open to add</T>
                </div>
              )}
              <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:6}}>
                <Row style={{justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <T size={15} weight={700} color="#0F172A">{catalog.name}</T>
                    <Row gap={6} style={{marginTop:3}}>
                      {catalog.category && <span style={{background:"#2C3E6B",color:"white",borderRadius:99,padding:"2px 10px",fontWeight:600,fontSize:"0.78em"}}>{catalog.category}</span>}
                    {catalog.season && <span style={{background:"#EFF6FF",color:"#2C3E6B",borderRadius:99,padding:"2px 8px",fontWeight:600}}>{catalog.season} {catalog.year}</span>}
                      {imgs.length > 0 && <T size={13} color="#111827">{imgs.length} image{imgs.length>1?"s":""}</T>}
                    </Row>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={() => {setLightbox(0);setSelected(catalog.id);setEditMode(false);}} style={{background:"#F1F5F9",border:"none",borderRadius:8,padding:"6px 14px",color:"#1E2E4F",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>View</button>
                    <button onClick={() => {setSelected(catalog.id);setEditMode(true);}} style={{background:"#2C3E6B",border:"none",borderRadius:8,padding:"6px 14px",color:"white",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Edit</button>
                  </div>
                </Row>
                {vendor && (
                  <div style={{background:"#F8FAFC",borderRadius:8,padding:"7px 10px",display:"flex",gap:12,alignItems:"center"}}>
                    <T size={13} weight={600} color="#2C3E6B">{vendor.name}</T>
                    {catalog.moq && <T size={13} color="#111827">MOQ: {catalog.moq}</T>}
                    {catalog.contact && <T size={13} color="#111827">· {catalog.contact}</T>}
                  </div>
                )}
                {catalog.notes && <T size={13} color="#111827" style={{lineHeight:1.5}}>{catalog.notes}</T>}
              </div>
            </div>
          );
        })}
      </div>

      {showAdd && <AddCatalogModal companies={companies} allCategories={allCategories} onAddCategory={onAddCategory} onAdd={catalog => {setItems(prev => [{...catalog,id:uid(),images:[]},...prev]);setShowAdd(false);}} onClose={() => setShowAdd(false)} />}
      {selItem && <CatalogDetailModal catalog={selItem} companies={companies} initialLightbox={lightbox} initialEditing={editMode} onUpdate={updated => setItems(prev => [...prev.map(i => i.id===updated.id?{...updated}:i)])} onDelete={id => {setItems(prev => prev.filter(i => i.id!==id));setSelected(null);}} onClose={() => {setSelected(null);setLightbox(null);}} />}
    </div>
  );
}

function AddCatalogModal({ companies, onAdd, onClose, allCategories, onAddCategory }) {
  const [name,setName] = useState("");
  const [season,setSeason] = useState("");
  const [year,setYear] = useState(new Date().getFullYear());
  const [category,setCategory] = useState("");
  const [newCat,setNewCat] = useState("");
  const [addingCat,setAddingCat] = useState(false);
  const [vendorId,setVendorId] = useState("");
  const [vendorSearch,setVendorSearch] = useState("");
  const [showVList,setShowVList] = useState(false);
  const [moq,setMoq] = useState("");
  const [contact,setContact] = useState("");
  const [notes,setNotes] = useState("");

  return (
    <Modal title="New Lookbook" onClose={onClose}>
      <Inp label="Catalog Name *" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Summer 2026 Bags" />
      <Grid>
        <Sel label="Season" value={season} options={[{v:"",l:"— Season —"},...SEASONS.map(s=>({v:s,l:s}))]} onChange={e=>setSeason(e.target.value)} />
        <Sel label="Year" value={year} options={[2024,2025,2026,2027].map(y=>({v:y,l:String(y)}))} onChange={e=>setYear(Number(e.target.value))} />
      </Grid>
      <Field label="Product Category">
        {addingCat ? (
          <Row gap={8}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="e.g. Scarves" autoFocus style={{flex:1,border:"1.5px solid #2C3E6B",borderRadius:8,padding:"8px 12px",fontFamily:"inherit",outline:"none"}} />
            <Btn sm onClick={()=>{if(newCat.trim()){onAddCategory(newCat.trim());setCategory(newCat.trim());setNewCat("");setAddingCat(false);}}}>Add</Btn>
            <Btn sm variant="outline" onClick={()=>setAddingCat(false)}>Cancel</Btn>
          </Row>
        ) : (
          <Row gap={8}>
            <select value={category} onChange={e=>setCategory(e.target.value)} style={{flex:1,border:"1px solid #6B7280",borderRadius:8,padding:"10px 12px",fontFamily:"inherit",outline:"none",background:"white"}}>
              <option value="">— Select Category —</option>
              {(allCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={()=>setAddingCat(true)} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:8,padding:"8px 12px",color:"#111827",cursor:"pointer",fontFamily:"inherit",fontWeight:600,whiteSpace:"nowrap"}}>+ New</button>
          </Row>
        )}
      </Field>
      <div style={{position:"relative"}}>
        <Field label="Vendor (optional)">
          <input value={vendorSearch} onChange={e=>{setVendorSearch(e.target.value);setVendorId("");setShowVList(true);}} onFocus={()=>setShowVList(true)} placeholder="Search vendors..." style={{width:"100%",border:"1px solid #6B7280",borderRadius:8,padding:"10px 12px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} />
          {vendorId && <span style={{position:"absolute",right:10,top:34,color:"#059669",fontWeight:700}}>✓</span>}
        </Field>
        {showVList && (
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #E2E8F0",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:50,maxHeight:180,overflowY:"auto"}}>
            {companies.filter(c=>!vendorSearch||c.name.toLowerCase().includes(vendorSearch.toLowerCase())).map(c=>(
              <div key={c.id} onClick={()=>{setVendorId(c.id);setVendorSearch(c.name);setShowVList(false);}} style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #F1F5F9"}}>{c.name}</div>
            ))}
          </div>
        )}
      </div>
      <Grid>
        <Inp label="MOQ" value={moq} onChange={e=>setMoq(e.target.value)} placeholder="e.g. 50 units" />
        <Inp label="Contact" value={contact} onChange={e=>setContact(e.target.value)} placeholder="Name or WhatsApp" />
      </Grid>
      <Ta label="Notes" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="General notes about this catalog..." rows={2} />
      <Row gap={8}>
        <Btn onClick={()=>onAdd({name,season,year,category,vendorId,moq,contact,notes})} disabled={!name}>Create</Btn>
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
      </Row>
    </Modal>
  );
}

function CatalogDetailModal({ catalog, companies, allCategories, onAddCategory, initialLightbox, initialEditing, onUpdate, onDelete, onClose }) {
  const [images,setImages] = useState(catalog.images||[]);
  const [lightbox,setLightbox] = useState(initialLightbox!=null?initialLightbox:null);
  const [editing,setEditing] = useState(initialEditing||false);
  const [uploading,setUploading] = useState(false);
  const [uploadMsg,setUploadMsg] = useState("");
  const [name,setName] = useState(catalog.name);
  const [season,setSeason] = useState(catalog.season||"");
  const [year,setYear] = useState(catalog.year||new Date().getFullYear());
  const [vendorId,setVendorId] = useState(catalog.vendorId||"");
  const [category,setCategory] = useState(catalog.category||"");
  const [newCat,setNewCat] = useState("");
  const [addingCat,setAddingCat] = useState(false);
  const [moq,setMoq] = useState(catalog.moq||"");
  const [contact,setContact] = useState(catalog.contact||"");
  const [notes,setNotes] = useState(catalog.notes||"");
  const vendor = companies.find(c => c.id === (editing?vendorId:catalog.vendorId));

  const addImages = async (files) => {
    setUploading(true);
    const total = files.length;
    let currentImgs = [...images];
    for (let i=0; i<total; i++) {
      setUploadMsg("Uploading " + (i+1) + " of " + total + "...");
      try {
        const url = await uploadToCloudinary(files[i]);
        currentImgs = [...currentImgs, url];
        setImages([...currentImgs]);
      } catch(e) {
        setUploadMsg("Error on image " + (i+1) + ": " + e.message);
        setUploading(false);
        return;
      }
    }
    onUpdate({...catalog,name,season,year,category,vendorId,moq,contact,notes,images:currentImgs});
    setUploading(false);
    setUploadMsg(total + " image" + (total!==1?"s":"") + " uploaded!");
    setTimeout(()=>{
      setUploadMsg("");
      onUpdate({...catalog,name,season,year,category,vendorId,moq,contact,notes,images:currentImgs});
      onClose();
    }, 1200);
  };

  const removeImage = (idx) => {
    const newImgs = images.filter((_,i) => i!==idx);
    setImages(newImgs);
    onUpdate({...catalog,name,season,year,vendorId,moq,contact,notes,images:newImgs});
  };

  const save = () => {
    onUpdate({...catalog,name,season,year,category,vendorId,moq,contact,notes,images});
    setEditing(false);
  };

  // View mode: fullscreen lightbox only
  if(!editing && lightbox!=null) {
    return (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:9999,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.4)"}}>
          <div>
            <span style={{fontWeight:700,color:"white",fontSize:"0.95em"}}>{catalog.name}</span>
            {images.length>0&&<span style={{color:"rgba(255,255,255,0.5)",fontSize:"0.75em",marginLeft:10}}>{lightbox+1} / {images.length}</span>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setEditing(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:"0.8em"}}>✎ Edit</button>
            <button onClick={()=>{onUpdate({...catalog,images});onClose();}} style={{background:"none",border:"none",color:"white",fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
          </div>
        </div>
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",padding:"20px 60px"}}>
          {images.length>0?(
            <img src={images[lightbox]} alt="" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain",borderRadius:8}} />
          ):(
            <div style={{color:"rgba(255,255,255,0.4)",textAlign:"center"}}>No photos — click ✎ Edit to add some</div>
          )}
          {images.length>1&&<>
            <button onClick={()=>setLightbox(l=>l>0?l-1:images.length-1)} style={{position:"absolute",left:12,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:99,width:44,height:44,color:"white",cursor:"pointer",fontSize:20}}>‹</button>
            <button onClick={()=>setLightbox(l=>l<images.length-1?l+1:0)} style={{position:"absolute",right:12,background:"rgba(255,255,255,0.15)",border:"none",borderRadius:99,width:44,height:44,color:"white",cursor:"pointer",fontSize:20}}>›</button>
          </>}
        </div>
        {images.length>1&&(
          <div style={{padding:"8px 20px",display:"flex",gap:5,justifyContent:"center",background:"rgba(0,0,0,0.4)"}}>
            {images.map((img,i)=>(
              <img key={i} src={img} alt="" onClick={()=>setLightbox(i)} style={{width:50,height:50,objectFit:"cover",borderRadius:5,cursor:"pointer",border:lightbox===i?"2px solid white":"2px solid transparent",flexShrink:0}} />
            ))}
          </div>
        )}
      </div>
    );
  }

  return (
    <Modal title={catalog.name} onClose={() => {onUpdate({...catalog,name,season,year,vendorId,moq,contact,notes,images});onClose();}} wide>

      {/* Image grid */}
      {images.length > 0 && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,borderRadius:10,overflow:"hidden"}}>
          {images.map((img,i) => (
            <div key={i} style={{position:"relative"}}>
              <img src={img} alt="" onClick={()=>setLightbox(i)} style={{width:"100%",height:120,objectFit:"cover",cursor:"pointer",display:"block"}} />
              <button onClick={()=>removeImage(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",border:"none",borderRadius:99,width:22,height:22,color:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* Upload */}
      <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:uploading?"#EFF6FF":"#F8FAFC",border:"1.5px dashed "+(uploading?"#2C3E6B":"#374151"),borderRadius:10,padding:"14px",cursor:uploading?"default":"pointer"}}>
        <input type="file" accept="image/*" multiple style={{display:"none"}} disabled={uploading} onChange={e=>addImages(Array.from(e.target.files))} />
        {uploading
          ? <T size={13} color="#2C3E6B" weight={600}>{uploadMsg}</T>
          : <><T size={13} color="#111827" weight={600}>+ Add Images</T><T size={13} color="#111827">tap to batch upload · saved to cloud</T></>
        }
      </label>

      {/* Vendor info */}
      {!editing && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {vendor && (
            <div style={{background:"#EFF6FF",borderRadius:10,padding:"10px 14px",display:"flex",flexDirection:"column",gap:4}}>
              <T size={13} weight={700} color="#2C3E6B">{vendor.name}</T>
              {catalog.moq && <T size={13} color="#111827">MOQ: {catalog.moq}</T>}
              {catalog.contact && <T size={13} color="#111827">Contact: {catalog.contact}</T>}
            </div>
          )}
          {catalog.notes && <T size={13} color="#111827" style={{lineHeight:1.6}}>{catalog.notes}</T>}
          <Row gap={8}>
            <Btn variant="outline" onClick={()=>setEditing(true)}>Edit Details</Btn>
            <Btn variant="danger" onClick={()=>{if(window.confirm("Delete this lookbook?"))onDelete(catalog.id);}}>Delete</Btn>
          </Row>
        </div>
      )}

      {editing && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Inp label="Name" value={name} onChange={e=>setName(e.target.value)} />
          <Grid>
            <Sel label="Season" value={season} options={[{v:"",l:"— Season —"},...SEASONS.map(s=>({v:s,l:s}))]} onChange={e=>setSeason(e.target.value)} />
            <Sel label="Year" value={year} options={[2024,2025,2026,2027].map(y=>({v:y,l:String(y)}))} onChange={e=>setYear(Number(e.target.value))} />
          </Grid>
          <Sel label="Vendor" value={vendorId} options={[{v:"",l:"— Unassigned —"},...companies.map(c=>({v:c.id,l:c.name}))]} onChange={e=>setVendorId(e.target.value)} />
          <Field label="Product Category">
            {addingCat ? (
              <Row gap={8}>
                <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="e.g. Scarves" autoFocus style={{flex:1,border:"1.5px solid #2C3E6B",borderRadius:8,padding:"8px 12px",fontFamily:"inherit",outline:"none"}} />
                <Btn sm onClick={()=>{if(newCat.trim()){onAddCategory(newCat.trim());setCategory(newCat.trim());setNewCat("");setAddingCat(false);}}}>Add</Btn>
                <Btn sm variant="outline" onClick={()=>setAddingCat(false)}>Cancel</Btn>
              </Row>
            ) : (
              <Row gap={8}>
                <select value={category} onChange={e=>setCategory(e.target.value)} style={{flex:1,border:"1px solid #6B7280",borderRadius:8,padding:"10px 12px",fontFamily:"inherit",outline:"none",background:"white"}}>
                  <option value="">— Select Category —</option>
                  {(allCategories||[]).map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <button onClick={()=>setAddingCat(true)} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:8,padding:"8px 12px",color:"#111827",cursor:"pointer",fontFamily:"inherit",fontWeight:600,whiteSpace:"nowrap"}}>+ New</button>
              </Row>
            )}
          </Field>
          <Grid>
            <Inp label="MOQ" value={moq} onChange={e=>setMoq(e.target.value)} />
            <Inp label="Contact" value={contact} onChange={e=>setContact(e.target.value)} />
          </Grid>
          <Ta label="Notes" value={notes} onChange={e=>setNotes(e.target.value)} rows={2} />
          <Row gap={8}><Btn onClick={save}>Save</Btn><Btn variant="outline" onClick={()=>setEditing(false)}>Cancel</Btn></Row>
        </div>
      )}
    </Modal>
  );
}


function AddCompanyModal({ onAdd, allCategories, onClose }) {
  const [f,setF]=useState({name:"",alibabaName:"",alibabaUrl:"",city:"",country:"China",stage:"researching",rating:3,minOrder:"",paymentTerms:"Alibaba Trade Assurance",categories:[],notes:"",redFlag:false,contacts:[],orders:[],conversations:[],followUps:[],images:[]});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleCat=(c)=>setF(p=>({...p,categories:p.categories.includes(c)?p.categories.filter(x=>x!==c):[...p.categories,c]}));
  return (
    <Modal title="New Vendor" onClose={onClose} wide>
      <Grid><Inp label="Legal Company Name" value={f.name} onChange={e=>u("name",e.target.value)} placeholder="Yiwu Shanglan Trading Co." /><Inp label="Alibaba Store Name (if different)" value={f.alibabaName} onChange={e=>u("alibabaName",e.target.value)} /></Grid>
      <Inp label="Alibaba Store URL" value={f.alibabaUrl} onChange={e=>u("alibabaUrl",e.target.value)} />
      <Grid><Inp label="City" value={f.city} onChange={e=>u("city",e.target.value)} /><Inp label="Country" value={f.country} onChange={e=>u("country",e.target.value)} /></Grid>
      <Grid><Sel label="Pipeline Stage" value={f.stage} options={STAGES.map(s=>({v:s.id,l:s.label}))} onChange={e=>u("stage",e.target.value)} /><Inp label="Min. Order Policy" value={f.minOrder} onChange={e=>u("minOrder",e.target.value)} /></Grid>
      <Inp label="Payment Terms" value={f.paymentTerms} onChange={e=>u("paymentTerms",e.target.value)} />
      <Field label="Product Categories"><div style={{ display:"flex",gap:6,flexWrap:"wrap",marginTop:2 }}>{allCategories.map(c=><button key={c} onClick={()=>toggleCat(c)} style={{ background:f.categories.includes(c)?"#1F2937":"#F1F5F9",color:f.categories.includes(c)?"white":"#1F2937",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:500 }}>{c}</button>)}</div></Field>
      <Field label="Initial Rating"><Stars value={f.rating} onChange={v=>u("rating",v)} /></Field>
      <Ta label="Notes" value={f.notes} onChange={e=>u("notes",e.target.value)} rows={2} />
      <Row gap={8}><Btn onClick={()=>{onAdd({...f,id:uid()});onClose();}} disabled={!f.name}>Add Company</Btn><Btn variant="outline" onClick={onClose}>Cancel</Btn></Row>
    </Modal>
  );
}

// Contacts CRM
function ContactsCRM({ companies, onGoToCompany }) {
  const [search,setSearch]=useState("");
  const [expanded,setExpanded]=useState(null);
  const all=companies.flatMap(co=>(co.contacts||[]).map(c=>({...c,companyId:co.id,companyName:co.name}))).filter(c=>!search||c.name.toLowerCase().includes(search.toLowerCase())||c.companyName.toLowerCase().includes(search.toLowerCase()));
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
      <T size={22} weight={700} color="#2C3E6B" style={{ letterSpacing:-0.5 }}>All Contacts</T>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search contacts or companies..." style={{ border:"1.5px solid #E2E8F0",borderRadius:10,padding:"9px 12px",fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box",background:"white" }} />
      {all.length===0&&<div style={{ textAlign:"center",padding:"60px 0",color:"#111827" }}>No contacts yet.</div>}
      <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
        {all.map(c=>(
          <Card key={c.id} style={{ cursor:"pointer" }} onClick={()=>setExpanded(expanded===c.id?null:c.id)}>
            <Row gap={12}>
              <Avatar name={c.name} size={38} />
              <div style={{ flex:1,minWidth:0 }}>
                <Row gap={8}><T size={14} weight={600} color="#111827">{c.name}</T>{c.primary&&<span style={{ fontWeight:700,background:"#1F2937",color:"white",borderRadius:99,padding:"1px 7px" }}>Primary</span>}</Row>
                <T size={13} color="#111827">{c.companyName}{c.title?" · "+c.title:""}</T>
              </div>
              <T size={14} color="#111827">{expanded===c.id?"▲":"▼"}</T>
            </Row>
            {expanded===c.id&&(
              <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #F1F5F9",display:"flex",flexDirection:"column",gap:8}}>
                {c.email&&<a href={"mailto:"+c.email} style={{display:"flex",alignItems:"center",gap:10,textDecoration:"none"}} onClick={e=>e.stopPropagation()}><span style={{width:32,height:32,background:"#EFF6FF",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✉️</span><div><T size={12} color="#111827" style={{display:"block"}}>Email</T><T size={13} color="#2C3E6B" weight={600} size={15}>{c.email}</T></div></a>}
                {c.phone&&<a href={"tel:"+c.phone} style={{display:"flex",alignItems:"center",gap:10,textDecoration:"none"}} onClick={e=>e.stopPropagation()}><span style={{width:32,height:32,background:"#F0FDF4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>📞</span><div><T size={12} color="#111827" style={{display:"block"}}>Phone</T><T size={13} color="#059669" weight={600} size={15}>{c.phone}</T></div></a>}
                {c.whatsapp&&<a href={"https://wa.me/"+c.whatsapp.replace(/[^0-9]/g,"")} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:10,textDecoration:"none"}} onClick={e=>e.stopPropagation()}><span style={{width:32,height:32,background:"#F0FDF4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>📱</span><div><T size={12} color="#111827" style={{display:"block"}}>WhatsApp</T><T size={13} color="#059669" weight={600} size={15}>{c.whatsapp}</T></div></a>}
                {c.wechat&&<div style={{display:"flex",alignItems:"center",gap:10}} onClick={e=>e.stopPropagation()}><span style={{width:32,height:32,background:"#F0FDF4",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>💬</span><div><T size={12} color="#111827" style={{display:"block"}}>WeChat</T><T size={13} color="#111827" weight={600}>{c.wechat}</T></div></div>}
                {c.alibabaHandle&&<div style={{display:"flex",alignItems:"center",gap:10}} onClick={e=>e.stopPropagation()}><span style={{width:32,height:32,background:"#FFFBEB",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>🏪</span><div><T size={12} color="#111827" style={{display:"block"}}>Alibaba</T><T size={13} color="#111827" weight={600}>{c.alibabaHandle}</T></div></div>}
                <button onClick={e=>{e.stopPropagation();onGoToCompany(c.companyId);}} style={{marginTop:4,background:"#F1F5F9",border:"none",borderRadius:8,padding:"8px 12px",color:"#111827",cursor:"pointer",fontFamily:"inherit",fontWeight:600,textAlign:"left"}}>View {c.companyName} →</button>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

function IcoEdit(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2937" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;}
function IcoTruck(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C3E6B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>;}
function IcoTrash(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>;}
function IcoClip(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C3E6B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;}

// Orders - Table View
  </script>
  <script type="text/babel" data-presets="react">
function Orders({ companies, allCategories, onUpdate, initialFilter, onClearFilter }) {
  const [filterCompany,setFilterCompany]=useState("all");
  const [filterCat,setFilterCat]=useState("all");
  const [filterStatus,setFilterStatus]=useState(initialFilter?.status==="active"?"__active__":"all");
  const [search,setSearch]=useState("");
  const [showNewOrder,setShowNewOrder]=useState(false);
  const [expandedOrder,setExpandedOrder]=useState(null);
  const [editStatusOrder,setEditStatusOrder]=useState(null);
  const [editOrder,setEditOrder]=useState(null);

  const activeStatuses=["Draft","Awaiting Payment","Confirmed","Paid","In Production","Shipped"];
  const allOrders=companies.flatMap(co=>(co.orders||[]).map(o=>({...o,companyId:co.id,companyName:co.name,companyContacts:co.contacts||[]})));
  const filtered=allOrders.filter(o=>{
    const q=search.toLowerCase();
    return(!q||o.ref?.toLowerCase().includes(q)||o.label?.toLowerCase().includes(q)||o.companyName?.toLowerCase().includes(q))
      &&(filterCompany==="all"||o.companyId===filterCompany)
      &&(filterCat==="all"||(o.lineItems||[]).some(li=>li.category===filterCat))
      &&(filterStatus==="all"?true:filterStatus==="__active__"?activeStatuses.includes(o.status):o.status===filterStatus);
  }).sort((a,b)=>b.date>a.date?1:-1);

  const updateOrder=(orderId,companyId,patch)=>{const co=companies.find(c=>c.id===companyId);if(!co)return;onUpdate({...co,orders:(co.orders||[]).map(o=>o.id===orderId?{...o,...patch}:o)});};
  const deleteOrder=(orderId,companyId)=>{if(!window.confirm("Delete this order?"))return;const co=companies.find(c=>c.id===companyId);if(!co)return;onUpdate({...co,orders:(co.orders||[]).filter(o=>o.id!==orderId)});};

  // Auto-expand order inline when openOrderId is passed in via initialFilter (from dashboard row clicks)
  useEffect(()=>{
    if(initialFilter?.openOrderId){
      const target=allOrders.find(o=>o.id===initialFilter.openOrderId);
      if(target){
        setExpandedOrder(target.id);
        // Scroll expanded row into view after paint
        requestAnimationFrame(()=>{
          const el=document.querySelector(`[data-order-id="${target.id}"]`);
          if(el)el.scrollIntoView({behavior:"smooth",block:"center"});
        });
      }
      if(onClearFilter)onClearFilter();
    }
  },[initialFilter?.openOrderId]);

  const activeCount=allOrders.filter(o=>activeStatuses.includes(o.status)).length;
  const totalValue=allOrders.reduce((s,o)=>s+(o.lineItems||[]).reduce((ss,li)=>ss+li.qty*li.unitCost,0),0);
  const overdueCt=allOrders.filter(o=>o.eta&&isOverdue(o.eta)&&activeStatuses.includes(o.status)).length;

  const statusColor=(s)=>{
    if(s==="Awaiting Payment")return{bg:"#FEF9C3",color:"#854D0E"};
    if(s==="Received")return{bg:"#DCFCE7",color:"#166534"};
    if(s==="Shipped")return{bg:"#DBEAFE",color:"#1E40AF"};
    if(s==="In Production")return{bg:"#FEF9C3",color:"#854D0E"};
    if(s==="Paid")return{bg:"#F0FDF4",color:"#16A34A"};
    if(s==="Confirmed")return{bg:"#EFF6FF",color:"#2563EB"};
    if(s==="Cancelled")return{bg:"#FEE2E2",color:"#991B1B"};
    if(s==="Archived")return{bg:"#F3F4F6",color:"#111827"};
    return{bg:"#F3F4F6",color:"#111827"};
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Row style={{justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <T size={22} weight={700} color="#2C3E6B" style={{display:"block",letterSpacing:-0.5}}>Orders</T>
          <Row gap={12} style={{marginTop:3}}>
            <T size={13} color="#111827">{activeCount} active · {fmtMoney(totalValue)} total</T>
            {overdueCt>0&&<span style={{background:"#FEE2E2",color:"#991B1B",fontWeight:700,padding:"1px 8px",borderRadius:99}}>⚠ {overdueCt} overdue</span>}
          </Row>
        </div>
        <Btn onClick={()=>setShowNewOrder(true)}>+ New Order</Btn>
      </Row>

      {/* Filters */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search orders..." style={{border:"1.5px solid #E2E8F0",borderRadius:8,padding:"7px 12px",fontFamily:"inherit",outline:"none",background:"white",width:180}} />
        <select value={filterStatus} onChange={e=>{setFilterStatus(e.target.value);if(onClearFilter)onClearFilter();}} style={{border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",background:"white",outline:"none"}}>
          <option value="all">All Statuses</option>
          <option value="__active__">Active Only</option>
          {ORDER_COLS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
        </select>
        <select value={filterCompany} onChange={e=>setFilterCompany(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",background:"white",outline:"none"}}>
          <option value="all">All Vendors</option>
          {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",background:"white",outline:"none"}}>
          <option value="all">All Categories</option>
          {allCategories.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {/* Table */}
      <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <div style={{background:"#2C3E6B",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em"}}>Orders</span>
          <span style={{color:"rgba(255,255,255,0.6)",fontSize:"0.72em"}}>{filtered.length} order{filtered.length!==1?"s":""}{filtered.length>0?" · "+fmtMoney(filtered.reduce((s,o)=>s+(o.lineItems||[]).reduce((ss,li)=>ss+li.qty*li.unitCost,0)||o.total||0,0)):""}</span>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0"}}>
                {[
                  {l:"Vendor / Order",a:"left",w:"40%"},
                  {l:"Status",a:"left",w:"12%"},
                  {l:"Dates",a:"left",w:"16%"},
                  {l:"Total",a:"right",w:"10%"},
                  {l:"Actions",a:"center",w:"12%"}
                ].map(h=><th key={h.l} style={{textAlign:h.a,width:h.w,padding:"10px 12px",fontWeight:600,color:"#374151",whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:0.4,fontSize:"0.78em"}}>{h.l}</th>)}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0&&(
                <tr><td colSpan={5} style={{textAlign:"center",padding:"60px 0",color:"#111827"}}>No orders found.</td></tr>
              )}
              {filtered.map(order=>{
                const sc=statusColor(order.status);
                const contact=(order.companyContacts||[]).find(c=>c.id===order.contactId)||(order.companyContacts||[])[0];
                const cats=[...new Set((order.lineItems||[]).map(li=>li.category).filter(Boolean))];
                const isOverdueOrder=order.eta&&isOverdue(order.eta)&&activeStatuses.includes(order.status);
                const expanded=expandedOrder===order.id;
                return (
                  <React.Fragment key={order.id}>
                    <tr
                      data-order-id={order.id}
                      onClick={()=>setExpandedOrder(expanded?null:order.id)}
                      style={{borderBottom:"2px solid #E8ECF4",cursor:"pointer",background:expanded?"#F0F4FF":"white",transition:"background 0.1s",verticalAlign:"top"}}
                      onMouseOver={e=>{if(!expanded)e.currentTarget.style.background="#F8FAFC";}}
                      onMouseOut={e=>{if(!expanded)e.currentTarget.style.background="white";}}
                    >
                      <td style={{padding:"12px 16px"}}>
                        <div style={{fontWeight:700,color:"#111827",marginBottom:3}}>{order.companyName}</div>
                        <div style={{color:"#374151",fontSize:"0.82em"}}>{[order.ref,order.label,contact?contact.name:null].concat(cats).filter(Boolean).join(" · ")||"—"}</div>
                      </td>
                      <td style={{padding:"12px 8px",verticalAlign:"middle"}}>
                        <span style={{background:sc.bg,color:sc.color,fontWeight:600,padding:"3px 9px",borderRadius:99,whiteSpace:"nowrap",fontSize:"0.82em"}}>{order.status||"Draft"}</span>
                      </td>
                      <td style={{padding:"12px 8px",verticalAlign:"middle"}}>
                        {order.date&&<div style={{fontSize:"0.85em"}}>Ord: {shortDate(order.date)}</div>}
                        {order.eta&&<div style={{color:isOverdueOrder?"#DC2626":"#111827",fontWeight:isOverdueOrder?700:400,fontSize:"0.85em"}}>ETA: {shortDate(order.eta)}{isOverdueOrder?" ⚠":""}</div>}
                      </td>
                      <td style={{padding:"12px 16px",fontWeight:600,textAlign:"right",verticalAlign:"middle"}}>
                        {fmtMoney((order.lineItems||[]).reduce((s,li)=>s+li.qty*li.unitCost,0)||order.total||0)}
                      </td>
                      <td style={{padding:"12px 8px",textAlign:"center",verticalAlign:"middle"}} onClick={e=>e.stopPropagation()}>
                        <div style={{display:"flex",gap:4,justifyContent:"center",alignItems:"center"}}>
                          {order.poFile&&<a href={order.poFile.data} download={order.poFile.name} title={order.poFile.name} style={{display:"inline-flex",alignItems:"center",padding:5,borderRadius:6,background:"none",textDecoration:"none"}} onMouseOver={e=>e.currentTarget.style.background="#EFF6FF"} onMouseOut={e=>e.currentTarget.style.background="none"}><IcoClip /></a>}
                          <button onClick={()=>setEditOrder(order)} title="Edit order" style={{background:"none",border:"none",cursor:"pointer",padding:5,borderRadius:6,display:"flex",alignItems:"center"}} onMouseOver={e=>e.currentTarget.style.background="#F1F5F9"} onMouseOut={e=>e.currentTarget.style.background="none"}><IcoEdit /></button>
                          {order.trackingNo&&<a href={"https://parcelsapp.com/en/tracking/"+order.trackingNo} target="_blank" rel="noreferrer" style={{background:"none",border:"none",cursor:"pointer",padding:5,borderRadius:6,display:"inline-flex",alignItems:"center",textDecoration:"none"}} onMouseOver={e=>e.currentTarget.style.background="#EFF6FF"} onMouseOut={e=>e.currentTarget.style.background="none"}><IcoTruck /></a>}
                          <button onClick={()=>deleteOrder(order.id,order.companyId)} style={{background:"none",border:"none",cursor:"pointer",padding:5,borderRadius:6,display:"flex",alignItems:"center"}} onMouseOver={e=>e.currentTarget.style.background="#FEF2F2"} onMouseOut={e=>e.currentTarget.style.background="none"}><IcoTrash /></button>
                        </div>
                      </td>
                    </tr>
                    {expanded&&(
                      <tr style={{background:"#F8FAFF",borderBottom:"2px solid #E0E7FF"}}>
                        <td colSpan={5} style={{padding:"16px 20px"}}>
                          <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
                            {/* Line items */}
                            {(order.lineItems||[]).length>0&&(
                              <div style={{flex:2,minWidth:260}}>
                                <div style={{fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:8,fontSize:"0.8em"}}>Line Items</div>
                                <div>
                                  {(order.lineItems||[]).map(li=>(
                                    <div key={li.id} style={{display:"flex",gap:8,borderBottom:"1px solid #E2E8F0",padding:"6px 0"}}>
                                      <span style={{flex:1}}>{li.description}</span>
                                      <span style={{whiteSpace:"nowrap"}}>{li.qty} x {fmtMoney(li.unitCost)}</span>
                                      <span style={{fontWeight:600,whiteSpace:"nowrap"}}>{fmtMoney(li.qty*li.unitCost)}</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                            {/* Details */}
                            <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:6}}>
                              <T size={12} weight={700} color="#111827" style={{textTransform:"uppercase",letterSpacing:0.7,display:"block",marginBottom:2}}>Details</T>
                              {order.trackingNo&&<Row gap={8}><T size={12} color="#111827" style={{width:70,flexShrink:0}}>Tracking</T><T size={12} color="#2C3E6B" weight={600}>{order.trackingNo}</T></Row>}
                              {order.carrier&&<Row gap={8}><T size={12} color="#111827" style={{width:70,flexShrink:0}}>Carrier</T><T size={12} color="#111827">{order.carrier}</T></Row>}
                              {order.shipping>0&&<Row gap={8}><T size={12} color="#111827" style={{width:70,flexShrink:0}}>Shipping</T><T size={12} color="#111827">{fmtMoney(order.shipping)}</T></Row>}
                              {order.notes&&<div style={{marginTop:4,background:"#FFFBEB",borderRadius:6,padding:"6px 10px",borderLeft:"2px solid #F59E0B"}}><T size={12} color="#451a03">{order.notes}</T></div>}
                            </div>
                            {/* Actions */}
                            <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-start"}}>
                              <T size={12} weight={700} color="#111827" style={{textTransform:"uppercase",letterSpacing:0.7,display:"block",marginBottom:2}}>Actions</T>
                              <Btn sm variant="outline" onClick={()=>setEditStatusOrder(order)}>Update Status</Btn>
                              <Btn sm variant="outline" onClick={()=>updateOrder(order.id,order.companyId,{status:"Cancelled"})}>Cancel</Btn>
                              <Btn sm variant="outline" onClick={()=>updateOrder(order.id,order.companyId,{status:"Archived"})}>Archive</Btn>
                              <Btn sm variant="danger" onClick={()=>deleteOrder(order.id,order.companyId)}>Delete</Btn>
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        <div style={{padding:"10px 16px",borderTop:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <T size={13} color="#111827">Showing {filtered.length} of {allOrders.length} orders</T>
          {overdueCt>0&&<T size={12} color="#DC2626" weight={600}>⚠ {overdueCt} overdue</T>}
        </div>
      </div>

      {/* Status edit modal */}
      {editStatusOrder&&(
        <Modal title={"Update Status — "+editStatusOrder.ref} onClose={()=>setEditStatusOrder(null)}>
          <T size={13} color="#111827" style={{display:"block",marginBottom:8}}>Current: <strong>{editStatusOrder.status}</strong></T>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ORDER_COLS.map(col=>(
              <button key={col.id} onClick={()=>{updateOrder(editStatusOrder.id,editStatusOrder.companyId,{status:col.id});setEditStatusOrder(null);}}
                style={{background:editStatusOrder.status===col.id?"#2C3E6B":"white",color:editStatusOrder.status===col.id?"white":"#1F2937",border:"1.5px solid "+(editStatusOrder.status===col.id?"#2C3E6B":"#E2E8F0"),borderRadius:10,padding:"10px 16px",fontWeight:editStatusOrder.status===col.id?700:400,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                {col.label}
              </button>
            ))}
          </div>
          <Btn variant="outline" onClick={()=>setEditStatusOrder(null)}>Cancel</Btn>
        </Modal>
      )}

      {editOrder&&<EditOrderModal order={editOrder} companies={companies} allCategories={allCategories} onSave={(patch)=>{updateOrder(editOrder.id,editOrder.companyId,patch);setEditOrder(null);}} onClose={()=>setEditOrder(null)} />
}
      {showNewOrder&&<NewOrderModal companies={companies} allCategories={allCategories} onAdd={(coId,order)=>{setShowNewOrder(false);
        const co=companies.find(c=>c.id===coId);
        if(co){onUpdate({...co,orders:[...(co.orders||[]),{...order,id:uid()}]});}
      }} onClose={()=>setShowNewOrder(false)} />}
    </div>
  );
}


function EditOrderModal({ order, companies, allCategories, onSave, onClose }) {
  const co = companies.find(c=>(c.orders||[]).some(o=>o.id===order.id));
  const contacts = co ? (co.contacts||[]) : [];
  const [f,setF] = useState({
    ref: order.ref||"",
    label: order.label||"",
    date: order.date||todayStr(),
    status: order.status||"Confirmed",
    contactId: order.contactId||"",
    eta: order.eta||"",
    trackingNo: order.trackingNo||"",
    carrier: order.carrier||"",
    shipping: order.shipping||"",
    total: order.total||"",
    notes: order.notes||""
  });
  const [lineItems,setLineItems] = useState(order.lineItems&&order.lineItems.length>0 ? order.lineItems : [{id:uid(),description:"",category:allCategories[0]||"",qty:"",unitCost:""}]);
  const u = (k,v) => setF(p=>({...p,[k]:v}));
  const total = lineItems.reduce((s,li)=>s+(Number(li.qty)||0)*(Number(li.unitCost)||0),0);

  return (
    <Modal title={"Edit Order — "+(order.ref||order.label||"Order")} onClose={onClose} wide>
      <Grid>
        <Inp label="Order Label" value={f.label} onChange={e=>u("label",e.target.value)} placeholder="e.g. Fall Jewelry" />
        <Inp label="PO / Invoice Ref" value={f.ref} onChange={e=>u("ref",e.target.value)} />
      </Grid>
      <Grid>
        <Inp label="Order Date" type="date" value={f.date} onChange={e=>u("date",e.target.value)} />
        <Sel label="Status" value={f.status} options={[{v:"Draft",l:"Draft"},{v:"Awaiting Payment",l:"Awaiting Payment"},...ORDER_COLS.map(c=>({v:c.id,l:c.label}))]} onChange={e=>u("status",e.target.value)} />
      </Grid>
      {contacts.length>0&&<Sel label="Contact" value={f.contactId} options={[{v:"",l:"Not specified"},...contacts.map(c=>({v:c.id,l:c.name}))]} onChange={e=>u("contactId",e.target.value)} />}
      <Grid>
        <Inp label="ETA" type="date" value={f.eta} onChange={e=>u("eta",e.target.value)} />
        <Inp label="Tracking #" value={f.trackingNo} onChange={e=>u("trackingNo",e.target.value)} />
      </Grid>
      <Grid>
        <Inp label="Carrier" value={f.carrier} onChange={e=>u("carrier",e.target.value)} placeholder="e.g. YunExpress" />
        <Inp label="Shipping ($)" type="number" step="0.01" value={f.shipping} onChange={e=>u("shipping",e.target.value)} />
      </Grid>
      <Ta label="Notes" value={f.notes} onChange={e=>u("notes",e.target.value)} rows={2} />
      {/* Line Items */}
      <div>
        <div style={{fontWeight:700,color:"#111827",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5,fontSize:"0.8em"}}>Line Items</div>
        {lineItems.map((li,i)=>(
          <div key={li.id} style={{position:"relative",background:"#F8FAFC",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #E2E8F0"}}>
            {lineItems.length>1&&<button onClick={()=>setLineItems(ls=>ls.filter(l=>l.id!==li.id))} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:16}}>×</button>}
            <Grid cols={2} gap={8}>
              <Inp label="Description" value={li.description} onChange={e=>setLineItems(ls=>ls.map(l=>l.id===li.id?{...l,description:e.target.value}:l))} />
              <Sel label="Category" value={li.category} options={allCategories} onChange={e=>setLineItems(ls=>ls.map(l=>l.id===li.id?{...l,category:e.target.value}:l))} />
            </Grid>
            <Grid cols={2} gap={8} style={{marginTop:8}}>
              <Inp label="Qty" type="number" value={li.qty} onChange={e=>setLineItems(ls=>ls.map(l=>l.id===li.id?{...l,qty:e.target.value}:l))} />
              <Inp label="Unit Cost ($)" type="number" step="0.01" value={li.unitCost} onChange={e=>setLineItems(ls=>ls.map(l=>l.id===li.id?{...l,unitCost:e.target.value}:l))} />
            </Grid>
          </div>
        ))}
        <Row gap={8}>
          <Btn variant="outline" sm onClick={()=>setLineItems(ls=>[...ls,{id:uid(),description:"",category:allCategories[0]||"",qty:"",unitCost:""}])}>+ Line Item</Btn>
          {total>0&&<T size={15} weight={700} color="#111827">Total: {fmtMoney(total)}</T>}
        </Row>
      </div>
      <Row gap={8}>
        <Btn onClick={()=>{onSave({...f,lineItems:lineItems.map(li=>({...li,qty:Number(li.qty),unitCost:Number(li.unitCost)}))});onClose();}}>Save Changes</Btn>
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
      </Row>
    </Modal>
  );
}

function NewOrderModal({ companies, allCategories, onAdd, onClose }) {
  const [selCo,setSelCo]=useState("");
  const [vendorSearch,setVendorSearch]=useState("");
  const [showVendorList,setShowVendorList]=useState(false);
  const [attachedFile,setAttachedFile]=useState(null);
  const [f,setF]=useState({ref:"",label:"",date:todayStr(),status:"Confirmed",contactId:"",eta:"",shipping:"",total:"",notes:""});
  const [pdfFile,setPdfFile]=useState(null);
  const [paste,setPaste]=useState("");
  const [parsing,setParsing]=useState(false);
  const [parseMsg,setParseMsg]=useState(null);
  const [supplierInfo,setSupplierInfo]=useState(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const co=companies.find(c=>c.id===selCo);
  const contacts=co?.contacts||[];

  const processExtracted=(ex)=>{
    if(ex.ref)u("ref",ex.ref);
    if(ex.label)u("label",ex.label);
    if(ex.date)u("date",ex.date);
    if(ex.eta)u("eta",ex.eta);
    if(ex.status)u("status",ex.status);
    if(ex.shipping)u("shipping",String(ex.shipping));
    if(ex.total)u("total",String(ex.total));
    if(ex.notes)u("notes",ex.notes);
    // Capture full supplier info for display
    if(ex.companyName||ex.contactName||ex.email||ex.phone){
      setSupplierInfo({
        companyName:ex.companyName||"",
        dba:ex.dba||"",
        contactName:ex.contactName||"",
        email:ex.email||"",
        phone:ex.phone||"",
        address:ex.address||"",
        website:ex.website||"",
      });
    }
    if(ex.companyName){
      const exName=ex.companyName.toLowerCase();
      // Try multiple matching strategies
      const m=companies.find(c=>c.name.toLowerCase().includes(exName)) ||
               companies.find(c=>exName.includes(c.name.toLowerCase())) ||
               companies.find(c=>{
                 // Match on any word in the company name
                 const words=exName.split(" ").filter(w=>w.length>3);
                 return words.some(w=>c.name.toLowerCase().includes(w));
               });
      if(m)setSelCo(m.id);
    }
    // Re-derive contacts after potential company change
    if(ex.contactName){
      const curCo=companies.find(c=>{
        const exName=(ex.companyName||"").toLowerCase();
        return c.name.toLowerCase().includes(exName)||exName.includes(c.name.toLowerCase());
      });
      const ctcts=(curCo||co)?.contacts||[];
      const matched=ctcts.find(c=>c.name.toLowerCase().includes(ex.contactName.toLowerCase()));
      if(matched)u("contactId",matched.id);
    }
    const n=[ex.ref,ex.label,ex.date,ex.companyName,ex.total].filter(v=>v&&String(v).length>0).length;
    setParseMsg({ok:n>0,t:n>0?"Extracted "+n+" fields. Review and confirm below.":"Could not extract details — fill in manually."});
  };

  const parseOrder=async()=>{
    if(!pdfFile&&!paste.trim())return;
    setParsing(true);setParseMsg(null);
    const prompt="Extract all details from this supplier PO, quotation, or invoice. Return ONLY valid JSON with: ref (PO/invoice/PI number), label (what was ordered e.g. Socks, Beanies and Scarves), date (YYYY-MM-DD), companyName (supplier legal company name), dba (doing business as / brand name if different), contactName (contact person name), email (supplier email), phone (supplier phone or WhatsApp number), address (supplier full address), website (supplier website), status (use Confirmed), shipping (shipping cost as number), total (grand total including shipping as number), notes (payment terms like FOB/DDP, shipping method, any important notes). Empty string or 0 if not found.";
    try {
      let textContent=paste;
      if(pdfFile){
        const pdfjsLib=await new Promise((resolve,reject)=>{
          if(window.pdfjsLib){resolve(window.pdfjsLib);return;}
          const s=document.createElement("script");
          s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
          s.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";resolve(window.pdfjsLib);};
          s.onerror=reject;
          document.head.appendChild(s);
        });
        const buf=await pdfFile.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:buf}).promise;
        let txt="";
        for(let i=1;i<=Math.min(pdf.numPages,6);i++){
          const pg=await pdf.getPage(i);
          const tc=await pg.getTextContent();
          txt+=tc.items.map(x=>x.str).join(" ")+" ";
        }
        if(!txt.trim()){setParseMsg({ok:false,t:"Could not read PDF text. Try the paste option."});setParsing(false);return;}
        textContent=txt;
      }
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt+" Text: "+textContent.slice(0,5000)}]})
      });
      const data=await resp.json();
      const text=data.content&&data.content[0]?data.content[0].text:"";
      const s=text.indexOf("{"),e=text.lastIndexOf("}");
      if(s>=0&&e>s){processExtracted(JSON.parse(text.slice(s,e+1)));}
      else{setParseMsg({ok:false,t:"Could not parse. Try copying more text."});}
    }catch(err){setParseMsg({ok:false,t:"Something went wrong — try again."});}
    setParsing(false);
  };

  return (
    <Modal title="New Order" onClose={onClose} wide>
      {/* PDF / Paste extractor */}
      <div style={{background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:12,padding:"14px",display:"flex",flexDirection:"column",gap:10}}>
        <Row gap={8}><span style={{}}>📄</span><div><T size={13} weight={700} color="#111827" style={{display:"block"}}>Upload PO or Paste Text</T><T size={13} color="#111827">Upload the PDF or paste text from your order confirmation</T></div></Row>
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:pdfFile?"#2C3E6B":"white",border:"1.5px dashed "+(pdfFile?"#2C3E6B":"#374151"),borderRadius:10,padding:"12px",cursor:"pointer",color:pdfFile?"white":"#1F2937",fontWeight:600,fontFamily:"inherit"}}>
          <input type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(file){setPdfFile(file);setPaste("");setParseMsg(null);}}} />
          {pdfFile?"📄 "+pdfFile.name:"📄 Choose PDF"}
        </label>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:1,background:"#E2E8F0"}} /><T size={13} color="#111827">or</T><div style={{flex:1,height:1,background:"#E2E8F0"}} /></div>
        <textarea value={paste} onChange={e=>{setPaste(e.target.value);if(e.target.value)setPdfFile(null);}} placeholder="Paste order text here…" rows={2} style={{border:"1.5px solid #6B7280",borderRadius:8,padding:"9px 12px",fontFamily:"inherit",outline:"none",background:"white",resize:"vertical",width:"100%",boxSizing:"border-box"}} />
        <button onClick={parseOrder} disabled={parsing||(!pdfFile&&!paste.trim())} style={{width:"100%",background:(pdfFile||paste.trim())&&!parsing?"#2C3E6B":"#E5E7EB",color:(pdfFile||paste.trim())&&!parsing?"white":"#1F2937",border:"none",borderRadius:9,padding:"10px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          {parsing?"Extracting details...":"Extract Order Details"}
        </button>
        {parseMsg&&<div style={{background:parseMsg.ok?"#ECFDF5":"#FFFBEB",border:"1px solid "+(parseMsg.ok?"#A7F3D0":"#FDE68A"),borderRadius:8,padding:"8px 12px"}}><T size={13} color={parseMsg.ok?"#065F46":"#92400E"}>{parseMsg.t}</T></div>}
      </div>

      {/* Extracted supplier info card */}
      {supplierInfo&&(
        <div style={{background:"#F0F4F8",border:"1.5px solid #C7D7ED",borderRadius:12,padding:"14px",display:"flex",flexDirection:"column",gap:8}}>
          <Row style={{justifyContent:"space-between"}}>
            <T size={13} weight={700} color="#2C3E6B" style={{textTransform:"uppercase",letterSpacing:0.5}}>Extracted Supplier Info</T>
            <button onClick={()=>setSupplierInfo(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#111827",lineHeight:1}}>×</button>
          </Row>
          {supplierInfo.companyName&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Company</T><T size={13} weight={600} color="#111827">{supplierInfo.companyName}</T></Row>}
          {supplierInfo.dba&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>DBA</T><T size={13} color="#111827">{supplierInfo.dba}</T></Row>}
          {supplierInfo.contactName&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Contact</T><T size={13} color="#111827">{supplierInfo.contactName}</T></Row>}
          {supplierInfo.email&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Email</T><T size={13} color="#2C3E6B">{supplierInfo.email}</T></Row>}
          {supplierInfo.phone&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Phone</T><T size={13} color="#111827">{supplierInfo.phone}</T></Row>}
          {supplierInfo.address&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Address</T><T size={13} color="#111827">{supplierInfo.address}</T></Row>}
          {supplierInfo.website&&<Row gap={8}><T size={13} color="#111827" style={{width:80,flexShrink:0}}>Website</T><T size={13} color="#2C3E6B">{supplierInfo.website}</T></Row>}
          <T size={13} color="#111827" style={{marginTop:2}}>This info was extracted from the document. Use it to create or update the vendor record.</T>
        </div>
      )}

      {/* Core fields */}
      <div style={{position:"relative"}}>
        <Field label="Vendor">
          <input value={vendorSearch} onChange={e=>{setVendorSearch(e.target.value);setSelCo("");setShowVendorList(true);}} onFocus={()=>setShowVendorList(true)} placeholder="Search vendors..." style={{width:"100%",border:"1.5px solid "+(selCo?"#2C3E6B":"#374151"),borderRadius:8,padding:"10px 12px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} />
          {selCo&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#059669",fontWeight:700}}>✓</span>}
        </Field>
        {showVendorList&&(
          <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1.5px solid #E2E8F0",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:50,maxHeight:220,overflowY:"auto"}}>
            {companies.filter(c=>!vendorSearch||c.name.toLowerCase().includes(vendorSearch.toLowerCase())).map(c=>(
              <div key={c.id} onClick={()=>{setSelCo(c.id);setVendorSearch(c.name);setShowVendorList(false);}} style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #F1F5F9",fontFamily:"inherit",background:selCo===c.id?"#EFF6FF":"white"}}>
                <T size={13} weight={selCo===c.id?700:500} color={selCo===c.id?"#2C3E6B":"#111827"}>{c.name}</T>
                {(c.categories||[]).length>0&&<T size={13} color="#111827" style={{display:"block",marginTop:1}}>{(c.categories||[]).slice(0,2).join(", ")}</T>}
              </div>
            ))}
            {companies.filter(c=>!vendorSearch||c.name.toLowerCase().includes(vendorSearch.toLowerCase())).length===0&&<div style={{padding:"12px 14px",color:"#111827"}}>No vendors found</div>}
          </div>
        )}
      </div>
      <Grid><Inp label="Order Label" value={f.label} onChange={e=>u("label",e.target.value)} placeholder="e.g. Fall Beanies and Scarves" /><Inp label="PO / Invoice Ref" value={f.ref} onChange={e=>u("ref",e.target.value)} /></Grid>
      <Grid><Inp label="Order Date" type="date" value={f.date} onChange={e=>u("date",e.target.value)} /><Sel label="Status" value={f.status} options={ORDER_COLS.map(c=>({v:c.id,l:c.label}))} onChange={e=>u("status",e.target.value)} /></Grid>
      {contacts.length>0&&<Sel label="Contact" value={f.contactId} options={[{v:"",l:"Not specified"},...contacts.map(c=>({v:c.id,l:c.name}))]} onChange={e=>u("contactId",e.target.value)} />}
      <Grid><Inp label="Total ($)" type="number" step="0.01" value={f.total} onChange={e=>u("total",e.target.value)} placeholder="Grand total" /><Inp label="Shipping ($)" type="number" step="0.01" value={f.shipping} onChange={e=>u("shipping",e.target.value)} placeholder="Shipping cost" /></Grid>
      <Grid><Inp label="ETA" type="date" value={f.eta} onChange={e=>u("eta",e.target.value)} /><Inp label="Tracking #" value={f.trackingNo||""} onChange={e=>u("trackingNo",e.target.value)} /></Grid>
      <Ta label="Notes" value={f.notes} onChange={e=>u("notes",e.target.value)} rows={3} placeholder="Payment terms, shipping method, anything else…" />
      <Row gap={8}>
        <div style={{background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}}>
          <T size={13} weight={700} color="#111827" style={{display:"block"}}>Attach PO Document</T>
          <label style={{display:"inline-flex",alignItems:"center",gap:6,background:attachedFile?"#2C3E6B":"white",border:"1.5px dashed "+(attachedFile?"#2C3E6B":"#374151"),borderRadius:8,padding:"9px 14px",cursor:"pointer",color:attachedFile?"white":"#1F2937",fontWeight:600,fontFamily:"inherit"}}>
            <input type="file" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls" style={{display:"none"}} onChange={e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>setAttachedFile({name:file.name,data:ev.target.result,type:file.type});r.readAsDataURL(file);}} />
            {attachedFile?"📎 "+attachedFile.name:"📎 Attach PDF, Image, or Excel"}
          </label>
          {attachedFile&&<button onClick={()=>setAttachedFile(null)} style={{background:"none",border:"none",color:"#111827",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>Remove</button>}
        </div>
        <Btn onClick={()=>{onAdd(selCo,{...f,total:Number(f.total)||0,shipping:Number(f.shipping)||0,lineItems:[],photos:[],poFile:attachedFile||null});}} disabled={!selCo||!f.ref}>Add Order</Btn>
        {(!selCo||!f.ref)&&<T size={13} color="#EF4444">{!selCo?"Select a vendor from the list first":!f.ref?"PO / Invoice Ref is required":""}</T>}
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
      </Row>
    </Modal>
  );
}


function OrderCard({ order, col, companies, allCategories, onUpdate, onDelete }) {
  const [expanded,setExpanded]=useState(false);
  const [editLabel,setEditLabel]=useState(false);
  const [labelVal,setLabelVal]=useState(order.label||"");
  const total=(order.lineItems||[]).reduce((s,li)=>s+li.qty*li.unitCost,0);
  const cats=[...new Set((order.lineItems||[]).map(li=>li.category).filter(Boolean))];
  return (
    <div style={{ background:"white",borderRadius:12,border:"1px solid #EEF2F7",boxShadow:"0 1px 3px rgba(0,0,0,0.05)" }}>
      <div style={{ height:4,background:col.bg,borderRadius:"12px 12px 0 0" }} />
      <div style={{ padding:"12px 14px" }}>
        <div style={{ marginBottom:8 }}>
          {editLabel?<input value={labelVal} onChange={e=>setLabelVal(e.target.value)} autoFocus onBlur={()=>{onUpdate(order.id,order.companyId,{label:labelVal});setEditLabel(false);}} onKeyDown={e=>{if(e.key==="Enter"){onUpdate(order.id,order.companyId,{label:labelVal});setEditLabel(false);}}} style={{ width:"100%",border:"1.5px solid #2563EB",borderRadius:6,padding:"4px 8px",fontFamily:"inherit",outline:"none",fontWeight:600,boxSizing:"border-box" }} />:<div style={{ display:"flex",alignItems:"center",gap:6,cursor:"text" }} onClick={()=>setEditLabel(true)}>{order.label?<T size={14} weight={700} color="#0F172A">{order.label}</T>:<T size={13} color="#111827" style={{ fontStyle:"italic" }}>+ Add label</T>}<span style={{ color:"#111827" }}>✏</span></div>}
          <T size={13} color="#111827" mono style={{ display:"block",marginTop:2 }}>{order.ref}</T>
        </div>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:8 }}>
          <Row gap={6}><Avatar name={order.companyName||"?"} size={18} /><T size={13} color="#111827" weight={500}>{order.companyName}</T></Row>
          <select value={order.status} onChange={e=>{e.stopPropagation();onUpdate(order.id,order.companyId,{status:e.target.value});}} style={{ fontWeight:700,color:"white",background:col.bg,border:"none",borderRadius:6,padding:"3px 6px",cursor:"pointer",fontFamily:"inherit",outline:"none" }}>{ORDER_COLS.map(c=><option key={c.id} value={c.id} style={{ background:"#fff",color:"#111" }}>{c.label}</option>)}</select>
        </div>
        {cats.length>0&&<div style={{ display:"flex",gap:4,flexWrap:"wrap",marginBottom:8 }}>{cats.map(c=><CatTag key={c} cat={c} small />)}</div>}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
          <div><T size={13} color="#111827" style={{ display:"block" }}>{fmtDate(order.date)}</T>{order.eta&&<T size={13} color="#111827" style={{ display:"block" }}>ETA {fmtDate(order.eta)}</T>}</div>
          <T size={15} weight={700} color="#0F172A">{fmtMoney(total)}</T>
        </div>
        {order.trackingNo&&<div style={{ background:"#F1F5F9",borderRadius:7,padding:"5px 8px",marginBottom:8,display:"flex",gap:6,alignItems:"center",justifyContent:"space-between" }}><Row gap={6}><T size={13} color="#334155" mono>{order.trackingNo}</T>{order.carrier&&<T size={13} color="#111827">via {order.carrier}</T>}</Row><a href={"https://parcelsapp.com/en/tracking/"+order.trackingNo} target="_blank" rel="noreferrer" style={{color:"#2C3E6B",fontWeight:700,textDecoration:"none"}}>Track</a></div>}
        {(order.poFile||(order.photos||[]).length>0)&&(
          <div style={{ display:"flex",gap:6,marginBottom:8,flexWrap:"wrap" }}>
            {order.poFile&&<a href={order.poFile.data} download={order.poFile.name} style={{ display:"flex",alignItems:"center",gap:4,background:"#F1F5F9",borderRadius:6,padding:"4px 9px",color:"#111827",textDecoration:"none",fontWeight:500 }}>📄 {order.poFile.name.slice(0,16)}</a>}
            {(order.photos||[]).length>0&&<span style={{ display:"flex",alignItems:"center",gap:4,background:"#F1F5F9",borderRadius:6,padding:"4px 9px",color:"#111827",fontWeight:500 }}>🖼 {order.photos.length} photo{order.photos.length>1?"s":""}</span>}
          </div>
        )}
        <div style={{ borderTop:"1px solid #F1F5F9",paddingTop:8,marginTop:4 }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <button onClick={()=>setExpanded(e=>!e)} style={{ background:"none",border:"none",cursor:"pointer",color:"#111827",fontFamily:"inherit",padding:0 }}>{expanded?"▲ Less":"▼ Details"}</button>
            <Row gap={6}>
              <button onClick={()=>onUpdate(order.id,order.companyId,{status:"Cancelled"})} style={{ background:"#FEF2F2",border:"none",borderRadius:5,padding:"2px 7px",color:"#EF4444",cursor:"pointer",fontFamily:"inherit",fontWeight:600 }}>Cancel</button>
              <button onClick={()=>onUpdate(order.id,order.companyId,{status:"Archived"})} style={{ background:"#F1F5F9",border:"none",borderRadius:5,padding:"2px 7px",color:"#111827",cursor:"pointer",fontFamily:"inherit",fontWeight:600 }}>Archive</button>
              <button onClick={()=>onDelete(order.id,order.companyId)} style={{ background:"none",border:"none",cursor:"pointer",color:"#111827",fontFamily:"inherit",padding:"2px 4px" }}>Delete</button>
            </Row>
          </div>
          {expanded&&(order.lineItems||[]).length>0&&(
            <div style={{ marginTop:8,borderTop:"1px solid #F1F5F9",paddingTop:8 }}>
              {order.lineItems.map(li=>(
                <div key={li.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 0" }}>
                  <div style={{ flex:1,minWidth:0 }}><T size={13} color="#111827" lines={1}>{li.description}</T><CatTag cat={li.category} small /></div>
                  <div style={{ textAlign:"right",marginLeft:8,flexShrink:0 }}><T size={13} color="#111827">{li.qty} × {fmtMoney(li.unitCost)}</T><T size={13} weight={600} color="#0F172A" style={{ display:"block" }}>{fmtMoney(li.qty*li.unitCost)}</T></div>
                </div>
              ))}
            </div>
          )}
          {expanded&&order.notes&&<div style={{ marginTop:8,background:"white",borderRadius:7,padding:"6px 8px",border:"1px solid #E5E7EB" }}><T size={13} color="#111827">{order.notes}</T></div>}
        </div>
      </div>
    </div>
  );
}

  </script>
  <script type="text/babel" data-presets="react">
function Budget({ budgets, onUpdate, onAdd, onDelete, allCategories, onAddCategory }) {
  const months=(()=>{const list=[];for(let i=-6;i<=6;i++){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+i);list.push(d.toISOString().slice(0,7));}return list.sort((a,b)=>b>a?1:-1);})();
  const [month,setMonth]=useState(todayStr().slice(0,7));
  const [modal,setModal]=useState(false);
  const [newCat,setNewCat]=useState("");
  const [showCatInput,setShowCatInput]=useState(false);
  const [rolloverConfirm,setRolloverConfirm]=useState(false);
  const view=budgets.filter(b=>b.month===month);
  const totalB=view.reduce((a,b)=>a+b.budget,0);
  const totalS=view.reduce((a,b)=>a+b.spent,0);
  const nextMonth=()=>{const[y,m]=month.split("-").map(Number);const d=new Date(y,m,1);return d.toISOString().slice(0,7);};
  const nextMonthLabel=()=>new Date(nextMonth()+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const nextMonthExists=budgets.some(b=>b.month===nextMonth());
  const rollover=()=>{const nm=nextMonth();view.forEach(b=>{const unspent=Math.max(0,b.budget-b.spent);onAdd({id:uid(),category:b.category,month:nm,budget:b.budget+unspent,spent:0});});setMonth(nm);setRolloverConfirm(false);};
  return (
    <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",gap:10 }}>
        <T size={22} weight={700} color="#2C3E6B" style={{ letterSpacing:-0.5 }}>Budget Tracker</T>
        <div style={{ display:"flex",gap:8 }}>
          {!nextMonthExists&&view.length>0&&<Btn variant="outline" onClick={()=>setRolloverConfirm(true)}>↪ Roll to {nextMonthLabel()}</Btn>}
          <Btn onClick={()=>setModal(true)}>+ Add Category</Btn>
        </div>
      </div>
      <Row gap={8}>
        <T size={13} color="#111827">Month:</T>
        <select value={month} onChange={e=>setMonth(e.target.value)} style={{ border:"1px solid #E2E8F0",borderRadius:8,padding:"6px 10px",fontFamily:"inherit",background:"white",outline:"none" }}>
          {months.map(m=>{const cur=todayStr().slice(0,7);const isCurrent=m===cur;const isFuture=m>cur;const label=new Date(m+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"});return <option key={m} value={m}>{isFuture?`▸ ${label}`:isCurrent?`● ${label}`:label}</option>;})}
        </select>
      </Row>
      {view.length===0&&<div style={{ textAlign:"center",color:"#111827",padding:"60px 0" }}>No budget entries for this month.<br/><br/><Btn onClick={()=>setModal(true)}>+ Add First Category</Btn></div>}
      {totalB>0&&(
        <Card style={{ background:"#1F2937",border:"none" }}>
          <T size={13} color="rgba(255,255,255,0.85)" style={{ display:"block",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5 }}>Total this month</T>
          <T size={24} weight={700} color="white" style={{ display:"block",letterSpacing:-0.5,marginTop:2 }}>{fmtMoney(totalS)} <T size={14} weight={400} color="rgba(255,255,255,0.4)">of {fmtMoney(totalB)}</T></T>
          <div style={{ height:8,background:"rgba(255,255,255,0.1)",borderRadius:99,overflow:"hidden",marginTop:10 }}>
            <div style={{ height:"100%",width:`${totalB?Math.min(100,totalS/totalB*100):0}%`,background:totalS/totalB>0.9?"#EF4444":totalS/totalB>0.7?"#F59E0B":"#2563EB",borderRadius:99 }} />
          </div>
          <T size={13} color="rgba(255,255,255,0.85)" weight={600} style={{ display:"block",marginTop:6 }}>{fmtMoney(totalB-totalS)} remaining</T>
        </Card>
      )}
      <div style={{ background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden" }}>
        <div style={{ background:"#2C3E6B",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
          <span style={{ fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em" }}>Budget Tracker · {new Date(month+"-15").toLocaleDateString("en-US",{month:"long",year:"numeric"})}</span>
          <span style={{ color:"white",fontSize:"0.8em",fontWeight:600 }}>{fmtMoney(totalS)} / {fmtMoney(totalB)}</span>
        </div>
        {view.map((b,idx)=>{
        const pct=b.budget?Math.min(100,b.spent/b.budget*100):0;
        return (
          <div key={b.id} style={{ borderBottom:idx<view.length-1?"1px solid #F1F5F9":"none",padding:"14px 20px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
              <span style={{ fontWeight:700,color:"#111827",fontSize:"0.9em" }}>{b.category}</span>
              <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                <span style={{ fontWeight:700,color:pct>90?"#EF4444":pct>70?"#D97706":"#16A34A",fontSize:"0.85em" }}>{Math.round(pct)}%</span>
                <button onClick={()=>onDelete(b.id)} style={{ background:"#FEE2E2",border:"none",color:"#DC2626",borderRadius:6,width:22,height:22,cursor:"pointer",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center" }}>×</button>
              </div>
            </div>
            <div style={{ height:6,background:"#F1F5F9",borderRadius:99,overflow:"hidden",marginBottom:10 }}>
              <div style={{ height:"100%",width:`${pct}%`,background:pct>90?"#EF4444":pct>70?"#F59E0B":"#4ADE80",borderRadius:99 }} />
            </div>
            <div style={{ display:"flex",gap:20,marginBottom:10 }}>
              <span style={{ fontSize:"0.82em",color:"#111827" }}><strong>{fmtMoney(b.budget)}</strong> budget</span>
              <span style={{ fontSize:"0.82em",color:"#111827" }}><strong>{fmtMoney(b.spent)}</strong> spent</span>
              <span style={{ fontSize:"0.82em",color:b.budget-b.spent<0?"#EF4444":"#111827" }}><strong>{fmtMoney(b.budget-b.spent)}</strong> remaining</span>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
              <div><label style={{ fontSize:"0.7em",fontWeight:700,color:"#111827",textTransform:"uppercase",letterSpacing:0.4,display:"block",marginBottom:3 }}>Edit Budget ($)</label><input type="number" value={b.budget} onChange={e=>onUpdate({...b,budget:+e.target.value})} style={{ border:"1px solid #E2E8F0",borderRadius:8,padding:"6px 8px",fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box" }} /></div>
              <div><label style={{ fontSize:"0.7em",fontWeight:700,color:"#111827",textTransform:"uppercase",letterSpacing:0.4,display:"block",marginBottom:3 }}>Edit Spent ($)</label><input type="number" value={b.spent} onChange={e=>onUpdate({...b,spent:+e.target.value})} style={{ border:"1px solid #E2E8F0",borderRadius:8,padding:"6px 8px",fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box" }} /></div>
            </div>
          </div>
        );
      })}
      </div>
      <Card style={{ background:"#F9FAFB",border:"1px dashed #E2E8F0" }}>
        <T size={13} weight={600} color="#111827" style={{ display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:0.4 }}>Manage Categories</T>
        <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:10 }}>{allCategories.map(c=><CatTag key={c} cat={c} />)}</div>
        {showCatInput?<Row gap={8}><input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="New category…" style={{ flex:1,border:"1px solid #E2E8F0",borderRadius:8,padding:"6px 10px",fontFamily:"inherit",outline:"none" }} /><Btn sm onClick={()=>{if(newCat.trim()){onAddCategory(newCat.trim());setNewCat("");setShowCatInput(false);}}}>Add</Btn><Btn sm variant="outline" onClick={()=>setShowCatInput(false)}>Cancel</Btn></Row>:<Btn sm variant="outline" onClick={()=>setShowCatInput(true)}>+ New Category</Btn>}
      </Card>
      {rolloverConfirm&&(
        <div style={{ position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center" }} onClick={e=>e.target===e.currentTarget&&setRolloverConfirm(false)}>
          <div style={{ background:"white",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,padding:24,display:"flex",flexDirection:"column",gap:14 }}>
            <T size={16} weight={700} color="#111827" style={{ display:"block" }}>Roll over to {nextMonthLabel()}?</T>
            <T size={13} color="#111827" style={{ display:"block",lineHeight:1.6 }}>Creates budget entries for {nextMonthLabel()} — this month's budget plus any unspent amounts carried forward. Spent resets to $0.</T>
            <div style={{ background:"#F8FAFC",borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8,border:"1px solid #E2E8F0" }}>
              <T size={13} weight={700} color="#111827" style={{ textTransform:"uppercase",letterSpacing:0.5,display:"block" }}>Preview</T>
              {view.map(b=>{const unspent=Math.max(0,b.budget-b.spent);return(<div key={b.id} style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}><T size={13} color="#111827">{b.category}</T><div style={{ display:"flex",alignItems:"center",gap:6 }}><T size={13} color="#111827">${b.budget.toLocaleString()}</T>{unspent>0&&<T size={13} color="#111827">+ ${unspent.toLocaleString()} unspent</T>}<T size={13} weight={700} color="#111827">= ${(b.budget+unspent).toLocaleString()}</T></div></div>);})}
            </div>
            <Row gap={10}><Btn full onClick={rollover}>Confirm Rollover</Btn><Btn full variant="outline" onClick={()=>setRolloverConfirm(false)}>Cancel</Btn></Row>
          </div>
        </div>
      )}
      {modal&&(
        <Modal title="Add Budget Entry" onClose={()=>setModal(false)}>
          {(()=>{const[f,setF]=useState({category:allCategories[0]||"",budget:"",spent:"0"});const u=(k,v)=>setF(p=>({...p,[k]:v}));return<><Sel label="Category" value={f.category} options={allCategories} onChange={e=>u("category",e.target.value)} /><Grid><Inp label="Budget ($)" type="number" value={f.budget} onChange={e=>u("budget",e.target.value)} /><Inp label="Already Spent ($)" type="number" value={f.spent} onChange={e=>u("spent",e.target.value)} /></Grid><Row gap={8}><Btn onClick={()=>{onAdd({id:uid(),category:f.category,budget:+f.budget,spent:+f.spent,month});setModal(false);}} disabled={!f.category||!f.budget}>Add Entry</Btn><Btn variant="outline" onClick={()=>setModal(false)}>Cancel</Btn></Row></>})()}
        </Modal>
      )}
    </div>
  );
}
