const NAV_ICONS = {dashboard:IconHome,ideas:IconIdeas,companies:IconVendors,budget:IconBudget,orders:IconOrders,research:IconResearch,tracking:IconTracking,pricing:IconPricing,tasks:IconTasks};
const NAV = [
  { id: "dashboard", label: "Home" },
  { id: "companies", label: "Vendors" },
  { id: "tasks",     label: "Tasks" },
  { id: "research",  label: "Lookbooks" },
  { id: "ideas",     label: "Ideas" },
  { id: "orders",    label: "Orders" },
  { id: "tracking",  label: "Tracking" },
  { id: "budget",    label: "Budget" },
  { id: "pricing",   label: "Pricing Tool" },
];


function PricingTool() {
  const [mode, setMode] = React.useState('assess');
  const [cost, setCost] = React.useState('');
  const [price, setPrice] = React.useState('');
  const [targetMargin, setTargetMargin] = React.useState('');
  const [result, setResult] = React.useState(null);

  const fmt$ = n => '$' + n.toFixed(2);
  const fmtP = n => n.toFixed(1) + '%';

  const calcAssess = () => {
    const c = parseFloat(cost), p = parseFloat(price);
    if(!c || !p || c <= 0 || p <= 0) return;
    const margin = (p - c) / p * 100;
    const markup = (p - c) / c * 100;
    const profit = p - c;
    setResult({ margin, markup, profit, cost: c });
  };

  const calcTarget = () => {
    const c = parseFloat(cost), m = parseFloat(targetMargin);
    if(!c || !m || c <= 0 || m <= 0 || m >= 100) return;
    const sellPrice = c / (1 - m / 100);
    const markup = (sellPrice - c) / c * 100;
    const profit = sellPrice - c;
    setResult({ margin: m, markup, profit, cost: c, sellPrice });
  };

  const reset = () => { setResult(null); setCost(''); setPrice(''); setTargetMargin(''); };

  const verdict = r => {
    if(r.margin < 50) return { msg: 'Thin margin — watch for fees, returns, and overhead.', bg: '#FEF2F2', border: '#FECACA', color: '#DC2626' };
    if(r.margin < 60) return { msg: 'Decent margin — workable but watch for discounting and fees.', bg: '#FFFBEB', border: '#FDE68A', color: '#D97706' };
    return { msg: 'Strong margin — solid cushion for operating costs and profit.', bg: '#F0FDF4', border: '#BBF7D0', color: '#16A34A' };
  };

  const scenarios = result ? [60,65,70,75,80,85].map(pct => ({
    pct,
    sellPrice: result.cost / (1 - pct/100),
    profit: result.cost / (1 - pct/100) - result.cost
  })) : [];

  const inStyle = { width:'100%', border:'1.5px solid #E2E8F0', borderRadius:8, padding:'10px 12px 10px 28px', fontSize:'1em', fontWeight:500, outline:'none', boxSizing:'border-box', fontFamily:'inherit', background:'white' };
  const lblStyle = { fontSize:'0.7em', fontWeight:700, color:'#111827', textTransform:'uppercase', letterSpacing:0.4, display:'block', marginBottom:4 };

  return (
    <div style={{background:'white',borderRadius:12,border:'1px solid #E2E8F0',overflow:'hidden'}}>
      <div style={{background:'#2C3E6B',padding:'12px 20px'}}>
        <span style={{fontWeight:700,color:'white',fontSize:'0.75em',textTransform:'uppercase',letterSpacing:0.7}}>Pricing Tool</span>
      </div>
      <div style={{padding:'10px 20px',background:'white',borderBottom:'2px solid #E8ECF4'}}>
        <div style={{display:'inline-flex',gap:2,background:'#F1F5F9',borderRadius:8,padding:3}}>
          <button onClick={()=>{setMode('assess');reset();}} style={{background:mode==='assess'?'#2C3E6B':'transparent',border:'none',color:mode==='assess'?'white':'#2C3E6B',borderRadius:6,padding:'7px 20px',fontWeight:700,fontSize:'0.78em',cursor:'pointer',fontFamily:'inherit'}}>Assess Margin</button>
          <button onClick={()=>{setMode('target');reset();}} style={{background:mode==='target'?'#2C3E6B':'transparent',border:'none',color:mode==='target'?'white':'#2C3E6B',borderRadius:6,padding:'7px 20px',fontWeight:700,fontSize:'0.78em',cursor:'pointer',fontFamily:'inherit'}}>Find Sell Price</button>
        </div>
      </div>
      <div style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
        {!result && <>
          <div style={{maxWidth:520}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label style={lblStyle}>Landed Cost</label>
                <div style={{position:'relative'}}>
                  <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#2C3E6B',fontWeight:600}}>$</span>
                  <input type="number" style={inStyle} value={cost} onChange={e=>setCost(e.target.value)} placeholder="0.00" step="0.01" min="0" onKeyDown={e=>e.key==='Enter'&&(mode==='assess'?calcAssess():calcTarget())} />
                </div>
              </div>
              {mode==='assess' ? (
                <div>
                  <label style={lblStyle}>Selling Price</label>
                  <div style={{position:'relative'}}>
                    <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#2C3E6B',fontWeight:600}}>$</span>
                    <input type="number" style={inStyle} value={price} onChange={e=>setPrice(e.target.value)} placeholder="0.00" step="0.01" min="0" onKeyDown={e=>e.key==='Enter'&&calcAssess()} />
                  </div>
                </div>
              ) : (
                <div>
                  <label style={lblStyle}>Target Margin</label>
                  <div style={{position:'relative'}}>
                    <input type="number" style={{...inStyle,paddingLeft:12,paddingRight:28}} value={targetMargin} onChange={e=>setTargetMargin(e.target.value)} placeholder="60" step="0.1" min="0" max="99.9" onKeyDown={e=>e.key==='Enter'&&calcTarget()} />
                    <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#2C3E6B',fontWeight:600}}>%</span>
                  </div>
                </div>
              )}
            </div>
            <button onClick={mode==='assess'?calcAssess:calcTarget} style={{width:'100%',background:'#2C3E6B',color:'white',border:'none',borderRadius:8,padding:12,fontWeight:700,fontSize:'0.85em',cursor:'pointer',textTransform:'uppercase',letterSpacing:0.5,fontFamily:'inherit'}}>
              {mode==='assess'?'Calculate Margin':'Calculate Sell Price'}
            </button>
          </div>
        </>}

        {result && <>
          <div style={{background:'#2C3E6B',borderRadius:10,padding:'16px 18px'}}>
            <div style={{fontSize:'0.75em',fontWeight:700,color:'white',textTransform:'uppercase',letterSpacing:0.7,marginBottom:12}}>Your Results</div>
            <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)',gap:0}}>
              <div style={{paddingRight:8,borderRight:'1px solid rgba(255,255,255,0.15)',minWidth:0,overflow:'hidden'}}>
                <div style={{fontSize:'0.6em',color:'white',textTransform:'uppercase',fontWeight:700,marginBottom:4,whiteSpace:'nowrap'}}>Gross Margin</div>
                <div style={{fontSize:'1.05em',fontWeight:700,color:'#4ADE80',lineHeight:1.1,whiteSpace:'nowrap'}}>{fmtP(result.margin)}</div>
              </div>
              <div style={{padding:'0 8px',borderRight:'1px solid rgba(255,255,255,0.15)',minWidth:0,overflow:'hidden'}}>
                <div style={{fontSize:'0.6em',color:'white',textTransform:'uppercase',fontWeight:700,marginBottom:4,whiteSpace:'nowrap'}}>Markup</div>
                <div style={{fontSize:'1.05em',fontWeight:700,color:'white',lineHeight:1.1,whiteSpace:'nowrap'}}>{fmtP(result.markup)}</div>
              </div>
              <div style={{paddingLeft:8,minWidth:0,overflow:'hidden'}}>
                <div style={{fontSize:'0.6em',color:'white',textTransform:'uppercase',fontWeight:700,marginBottom:4,whiteSpace:'nowrap'}}>Profit</div>
                <div style={{fontSize:'1.05em',fontWeight:700,color:'white',lineHeight:1.1,whiteSpace:'nowrap'}}>{fmt$(result.profit)}</div>
                {result.sellPrice&&<div style={{fontSize:'0.65em',color:'rgba(255,255,255,0.75)',marginTop:4,whiteSpace:'nowrap'}}>@ {fmt$(result.sellPrice)}</div>}
              </div>
            </div>
          </div>

          {(()=>{const v=verdict(result);return <div style={{background:v.bg,border:`1px solid ${v.border}`,borderRadius:8,padding:'10px 14px',fontSize:'0.85em',color:v.color,fontWeight:600}}>{v.msg}</div>})()}

          <div style={{fontSize:'0.72em',fontWeight:700,color:'#111827',textTransform:'uppercase',letterSpacing:0.7,marginTop:4}}>Same cost, different margins</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:8,maxWidth:600}}>
            {scenarios.map(s=>(
              <div key={s.pct} style={{background:'#2C3E6B',borderRadius:8,padding:'10px 10px',minWidth:0,overflow:'hidden'}}>
                <div style={{fontSize:'1.05em',fontWeight:700,color:'white',marginBottom:6,whiteSpace:'nowrap'}}>{s.pct}%</div>
                <div style={{fontSize:'0.58em',fontWeight:700,color:'rgba(255,255,255,0.8)',textTransform:'uppercase',marginBottom:1,whiteSpace:'nowrap'}}>Sell Price</div>
                <div style={{fontSize:'0.88em',fontWeight:700,color:'white',marginBottom:6,whiteSpace:'nowrap'}}>{fmt$(s.sellPrice)}</div>
                <div style={{fontSize:'0.58em',fontWeight:700,color:'rgba(255,255,255,0.8)',textTransform:'uppercase',marginBottom:1,whiteSpace:'nowrap'}}>Profit</div>
                <div style={{fontSize:'0.88em',fontWeight:700,color:'#4ADE80',whiteSpace:'nowrap'}}>{fmt$(s.profit)}</div>
              </div>
            ))}
          </div>

          <button onClick={reset} style={{background:'none',border:'1.5px solid #E2E8F0',borderRadius:8,padding:10,color:'#111827',fontSize:'0.82em',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>↑ Calculate Another</button>
        </>}
      </div>
    </div>
  );
}

function MonthCalendar({ companies, onGoToOrder }) {
  const [offset, setOffset] = useState(0);
  const [tooltip, setTooltip] = useState(null);

  const allOrders = companies.flatMap(co=>(co.orders||[]).map(o=>({...o,companyName:co.name,companyId:co.id})));
  const activeStatuses = ["Confirmed","Paid","In Production","Shipped","Awaiting Payment"];

  // Orders with either trackingNo ETA (carrier) or manual ETA (vendor estimate)
  const relevantOrders = allOrders.filter(o=>o.eta && activeStatuses.includes(o.status) && o.status!=="Cancelled" && o.status!=="Archived");

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr2 = today.toISOString().slice(0,10);

  // Current month based on offset
  const viewDate = new Date(today.getFullYear(), today.getMonth() + offset, 1);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleDateString("en-US", {month:"long", year:"numeric"});

  // Days in month
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const ordersForDay = (day) => {
    const ds = year+"-"+String(month+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    return relevantOrders.filter(o=>o.eta===ds);
  };

  const totalThisMonth = relevantOrders.filter(o=>{
    const d = new Date(o.eta+"T12:00:00");
    return d.getFullYear()===year && d.getMonth()===month;
  }).length;

  // Build calendar grid cells
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);

  return (
    <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"visible",position:"relative"}}>
      {/* Header */}
      <div style={{background:"#2C3E6B",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:"12px 12px 0 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span style={{fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em"}}>Delivery Calendar</span>
          {totalThisMonth>0&&<span style={{background:"rgba(74,222,128,0.2)",color:"#4ADE80",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>{totalThisMonth} this month</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>setOffset(o=>o-1)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"white",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>←</button>
          <span style={{color:"white",fontWeight:600,minWidth:140,textAlign:"center"}}>{monthName}</span>
          <button onClick={()=>setOffset(o=>o+1)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"white",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>→</button>
          {offset!==0&&<button onClick={()=>setOffset(0)} style={{background:"rgba(74,222,128,0.2)",border:"none",color:"#4ADE80",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:"0.8em"}}>Today</button>}
        </div>
      </div>
      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",borderBottom:"0.5px solid #F1F5F9"}}>
        {DAY_NAMES.map(d=>(
          <div key={d} style={{padding:"7px 4px",textAlign:"center",fontSize:"0.65em",fontWeight:600,color:"#9CA3AF",textTransform:"uppercase",letterSpacing:0.5,borderRight:"0.5px solid #F1F5F9"}}>{d}</div>
        ))}
      </div>
      {/* Calendar grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))"}}>
        {cells.map((day,i)=>{
          const isToday = day && year===today.getFullYear() && month===today.getMonth() && day===today.getDate();
          const isWeekend = i%7===0 || i%7===6;
          const dayOrders = day ? ordersForDay(day) : [];
          const isLastRow = i >= cells.length-7;
          return (
            <div key={i} style={{
              borderRight:((i+1)%7!==0)?"0.5px solid #F1F5F9":"none",
              borderBottom:!isLastRow?"0.5px solid #F1F5F9":"none",
              background:isToday?"#2C3E6B":isWeekend?"#F9FAFB":"white",
              minHeight:72,
              padding:"5px"
            }}>
              {day&&(
                <>
                  <div style={{fontSize:"0.78em",fontWeight:isToday?700:600,color:isToday?"white":isWeekend?"#D1D5DB":"#374151",marginBottom:3,paddingLeft:2,display:"flex",alignItems:"center",gap:4}}>
                    {day}
                    {isToday&&<span style={{fontSize:"0.65em",background:"#4ADE80",color:"#064E3B",padding:"1px 4px",borderRadius:3,fontWeight:700}}>TODAY</span>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    {dayOrders.map(o=>{
                      const isLate = o.eta < todayStr2;
                      const hasTracking = o.trackingNo && o.trackingNo.trim();
                      const bg = isLate?"#DC2626":hasTracking?"#2C3E6B":"#F59E0B";
                      const textColor = "white";
                      const total = (o.lineItems||[]).reduce((s,li)=>s+li.qty*li.unitCost,0)||o.total||0;
                      return (
                        <div
                          key={o.id}
                          onClick={()=>onGoToOrder&&onGoToOrder(o.companyId)}
                          onMouseEnter={e=>{
                            const rect = e.currentTarget.getBoundingClientRect();
                            const parentRect = e.currentTarget.closest("[data-cal]")?.getBoundingClientRect();
                            setTooltip({order:o,x:rect.left,y:rect.bottom,total});
                          }}
                          onMouseLeave={()=>setTooltip(null)}
                          style={{
                            background:isToday?"rgba(255,255,255,0.15)":bg,
                            borderRadius:4,
                            padding:"2px 4px",
                            cursor:"pointer",
                            border:hasTracking?"none":"1.5px dashed #D97706",
                          }}
                        >
                          <div style={{fontSize:"0.58em",color:isToday?"white":textColor,fontWeight:600,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.label||o.ref||o.companyName}</div>
                          {!hasTracking&&<div style={{fontSize:"0.52em",color:isToday?"rgba(255,255,255,0.7)":"#FEF3C7",lineHeight:1.2}}>est.</div>}
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
      {/* Legend */}
      <div style={{padding:"8px 16px",borderTop:"0.5px solid #F1F5F9",display:"flex",gap:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,background:"#2C3E6B",borderRadius:2}}></div><span style={{fontSize:"0.7em",color:"#6B7280"}}>Carrier confirmed</span></div>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,background:"#F59E0B",borderRadius:2,border:"1.5px dashed #D97706"}}></div><span style={{fontSize:"0.7em",color:"#6B7280"}}>Vendor estimate</span></div>
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,background:"#DC2626",borderRadius:2}}></div><span style={{fontSize:"0.7em",color:"#6B7280"}}>Overdue</span></div>
      </div>
      {/* Tooltip */}
      {tooltip&&(
        <div style={{position:"fixed",zIndex:9999,background:"#1E2E4F",borderRadius:10,padding:"12px 16px",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",minWidth:220,pointerEvents:"none",top:tooltip.y+8,left:Math.min(tooltip.x, window.innerWidth-260)}}>
          <div style={{fontWeight:700,color:"white",marginBottom:4}}>{tooltip.order.companyName}</div>
          {tooltip.order.label&&<div style={{color:"rgba(255,255,255,0.8)",fontSize:"0.85em",marginBottom:4}}>{tooltip.order.label}</div>}
          {tooltip.order.ref&&<div style={{color:"#4ADE80",fontSize:"0.8em",fontFamily:"monospace",marginBottom:4}}>{tooltip.order.ref}</div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span style={{background:"rgba(255,255,255,0.1)",color:"white",fontSize:"0.75em",padding:"2px 7px",borderRadius:99}}>{tooltip.order.status}</span>
            {tooltip.total>0&&<span style={{color:"#4ADE80",fontWeight:700,fontSize:"0.85em"}}>${Number(tooltip.total).toLocaleString("en-US",{minimumFractionDigits:2})}</span>}
          </div>
          {tooltip.order.trackingNo&&<div style={{color:"rgba(255,255,255,0.6)",fontSize:"0.75em",fontFamily:"monospace"}}>{tooltip.order.trackingNo}</div>}
          {!tooltip.order.trackingNo&&<div style={{color:"#F59E0B",fontSize:"0.75em"}}>Vendor estimate — no tracking yet</div>}
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.72em",marginTop:4}}>Click to open order</div>
        </div>
      )}
    </div>
  );
}

function TrackingPage({ companies, onGo }) {
  const allOrders = companies.flatMap(co=>(co.orders||[]).map(o=>({...o,companyName:co.name,companyId:co.id})));
  const activeStatuses = ["Confirmed","Paid","In Production","Shipped","Awaiting Payment"];
  const tracked = allOrders.filter(o=>o.trackingNo&&o.trackingNo.trim()&&activeStatuses.includes(o.status));
  const untracked = allOrders.filter(o=>o.status==="Shipped"&&(!o.trackingNo||!o.trackingNo.trim()));
  const inTransitNoEta = tracked.filter(o=>!o.eta);

  const statusColor=(s)=>{
    if(s==="Shipped")return{bg:"#DBEAFE",color:"#1E40AF"};
    if(s==="In Production")return{bg:"#FEF9C3",color:"#854D0E"};
    if(s==="Confirmed")return{bg:"#EFF6FF",color:"#2563EB"};
    if(s==="Paid")return{bg:"#F0FDF4",color:"#16A34A"};
    return{bg:"#F3F4F6",color:"#374151"};
  };

  const goToOrder = (companyId) => {
    onGo("company", companyId);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div>
        <div style={{fontWeight:700,color:"#2C3E6B",letterSpacing:-0.5,fontSize:"1.4em",marginBottom:4}}>Tracking</div>
        <div style={{color:"#374151"}}>{tracked.length} shipments tracked · {untracked.length} missing tracking</div>
      </div>

      {/* Full month calendar */}
      <MonthCalendar companies={companies} onGoToOrder={goToOrder} />

      {/* In transit no ETA */}
      {inTransitNoEta.length>0&&(
        <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{background:"#1E2E4F",padding:"12px 20px",display:"flex",alignItems:"center",gap:10}}>

            <span style={{background:"rgba(255,255,255,0.15)",color:"white",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>{inTransitNoEta.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column"}}>
            {inTransitNoEta.map((o,i)=>(
              <div key={o.id} onClick={()=>goToOrder(o.companyId)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:i<inTransitNoEta.length-1?"1px solid #F1F5F9":"none",cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background="white"}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,color:"#111827"}}>{o.companyName}</div>
                  <div style={{color:"#374151",fontSize:"0.85em",fontFamily:"monospace"}}>{o.trackingNo}</div>
                </div>
                <span style={{background:"#DBEAFE",color:"#1E40AF",fontWeight:600,padding:"3px 9px",borderRadius:99,fontSize:"0.82em"}}>Shipped</span>
                <span style={{fontSize:"0.8em",color:"#374151"}}>No carrier ETA yet</span>
                <button onClick={e=>{e.stopPropagation();const tn=o.trackingNo,c=(o.carrier||"").toLowerCase();let u=c.includes("ups")||/^1Z/i.test(tn)?"https://www.ups.com/track?tracknum="+tn:c.includes("fedex")?"https://www.fedex.com/fedextrack/?trknbr="+tn:c.includes("usps")?"https://tools.usps.com/go/TrackConfirmAction?tLabels="+tn:c.includes("dhl")?"https://www.dhl.com/en/express/tracking.html?AWB="+tn:c.includes("yun")?"https://www.yuntrack.com/track?number="+tn:"https://parcelsapp.com/en/tracking/"+tn;window.open(u,"_blank");}} style={{background:"#2C3E6B",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:"0.85em"}}>Track →</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Missing tracking */}
      {untracked.length>0&&(
        <div style={{background:"white",borderRadius:12,border:"1px solid #FEE2E2",overflow:"hidden"}}>
          <div style={{background:"#DC2626",padding:"12px 20px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em"}}>⚠ Missing Tracking Numbers</span>
            <span style={{background:"rgba(255,255,255,0.2)",color:"white",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>{untracked.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column"}}>
            {untracked.map((o,i)=>(
              <div key={o.id} onClick={()=>goToOrder(o.companyId)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:i<untracked.length-1?"1px solid #F1F5F9":"none",cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background="white"}>

      <div style={{background:"white",borderRadius:12,border:"1px solid #E2E8F0",overflow:"hidden"}}>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <span style={{fontWeight:700,color:"white",textTransform:"uppercase",letterSpacing:0.7,fontSize:"0.75em"}}>All Active Shipments</span>
          <span style={{background:"rgba(74,222,128,0.2)",color:"#4ADE80",fontWeight:700,padding:"2px 8px",borderRadius:99,fontSize:"0.7em"}}>{tracked.length}</span>
        </div>
        {tracked.length===0?(
          <div style={{padding:"40px 20px",textAlign:"center",color:"#374151"}}>No active shipments with tracking numbers.</div>
        ):(
          <div style={{display:"flex",flexDirection:"column"}}>
            {tracked.map((o,i)=>{
              const sc=statusColor(o.status);
              const isOverdueOrder=o.eta&&isOverdue(o.eta);
              return (
                <div key={o.id} onClick={()=>goToOrder(o.companyId)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",borderBottom:i<tracked.length-1?"1px solid #F1F5F9":"none",cursor:"pointer"}} onMouseOver={e=>e.currentTarget.style.background="#F8FAFC"} onMouseOut={e=>e.currentTarget.style.background="white"}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:"#111827"}}>{o.companyName}</div>

                    <div style={{fontFamily:"monospace",color:"#2C3E6B",fontSize:"0.8em",marginTop:3}}>{o.trackingNo}</div>
                  </div>
                  <span style={{background:sc.bg,color:sc.color,fontWeight:600,padding:"3px 9px",borderRadius:99,fontSize:"0.82em",whiteSpace:"nowrap"}}>{o.status}</span>

                    {o.eta?<div style={{color:isOverdueOrder?"#DC2626":"#374151",fontWeight:isOverdueOrder?700:400,fontSize:"0.85em"}}>ETA: {shortDate(o.eta)}{isOverdueOrder?" ⚠":""}</div>:<div style={{color:"#9CA3AF",fontSize:"0.85em"}}>No ETA</div>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();const tn=o.trackingNo,c=(o.carrier||"").toLowerCase();let u=c.includes("ups")||/^1Z/i.test(tn)?"https://www.ups.com/track?tracknum="+tn:c.includes("fedex")?"https://www.fedex.com/fedextrack/?trknbr="+tn:c.includes("usps")?"https://tools.usps.com/go/TrackConfirmAction?tLabels="+tn:c.includes("dhl")?"https://www.dhl.com/en/express/tracking.html?AWB="+tn:c.includes("yun")?"https://www.yuntrack.com/track?number="+tn:"https://parcelsapp.com/en/tracking/"+tn;window.open(u,"_blank");}} style={{background:"#2C3E6B",color:"white",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",fontSize:"0.85em",whiteSpace:"nowrap"}}>Track →</button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


function App() {

  const [nav,setNav]=useState("dashboard");

  const [budgets,setBudgets]=useState([]);

  const [researchItems,setResearchItems]=useState([]);

  const [showImport,setShowImport]=useState(false);
  const [dashFilter,setDashFilter]=useState(null);
  const [showExport,setShowExport]=useState(false);

      .then(([co,bu,ca,id,re])=>{setCompanies(co);setBudgets(bu);setCategories(ca);setIdeas(id);setResearchItems(re);setReady(true);});

  useEffect(()=>{if(ready)save("ali4_cats",categories);},[categories,ready]);
  useEffect(()=>{if(ready)save("ali4_ideas",ideas);},[ideas,ready]);
  useEffect(()=>{if(ready)save("ali4_research",researchItems);},[researchItems,ready]);
  useEffect(()=>{document.body.style.fontSize=fontSize+"px";localStorage.setItem("adp_fontsize",fontSize);},[fontSize]);

  const updateCompany=(updated)=>setCompanies(cs=>cs.map(c=>c.id===updated.id?updated:c));
  const addCompany=(c)=>setCompanies(cs=>[c,...cs]);

  const overdueCt=companies.flatMap(c=>(c.followUps||[]).filter(t=>!t.done&&isOverdue(t.dueDate))).length;
  const waitingOnMe=companies.filter(c=>(c.conversations||[]).some(cv=>cv.waitingOn==="They're waiting on me")).length;

  const goTo=(page,id,filter)=>{

  const exportJSON=()=>{
    const obj={exportedAt:new Date().toISOString(),version:"1.0",companies:companies.map(co=>({...co,images:(co.images||[]).map(i=>({id:i.id,name:i.name,note:i.note})),orders:(co.orders||[]).map(o=>({...o,photos:(o.photos||[]).map(p=>({id:p.id,name:p.name})),poFile:o.poFile?{name:o.poFile.name}:null}))})),budgets,categories,ideas};
    const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`alidesk-backup-${todayStr()}.json`;a.click();URL.revokeObjectURL(url);setShowExport(false);
  };

  const exportCSV=()=>{
    const rows=[["Company","Stage","Contact","WhatsApp","Order Ref","Order Label","Date","Status","ETA","Item","Category","Qty","Unit Cost","Line Total","Order Total","Tracking","Notes"]];
    companies.forEach(co=>{const ords=co.orders||[];if(ords.length===0){const p=(co.contacts||[])[0];rows.push([co.name,co.stage,p?.name||"",p?.whatsapp||"","","","","","","","","","","","","",co.notes||""]);}else ords.forEach(o=>{const oTotal=(o.lineItems||[]).reduce((s,li)=>s+li.qty*li.unitCost,0);const contact=(co.contacts||[]).find(c=>c.id===o.contactId);if((o.lineItems||[]).length===0){rows.push([co.name,co.stage,contact?.name||"",contact?.whatsapp||"",o.ref||"",o.label||"",o.date||"",o.status||"",o.eta||"","","","","",oTotal.toFixed(2),"",o.trackingNo||"",o.notes||""]);}else{o.lineItems.forEach((li,i)=>{rows.push([i===0?co.name:"",i===0?co.stage:"",i===0?(contact?.name||""):"",i===0?(contact?.whatsapp||""):"",i===0?(o.ref||""):"",i===0?(o.label||""):"",i===0?(o.date||""):"",i===0?(o.status||""):"",i===0?(o.eta||""):"",li.description||"",li.category||"",li.qty||"",li.unitCost||"",(li.qty*li.unitCost).toFixed(2),i===0?oTotal.toFixed(2):"",i===0?(o.trackingNo||""):"",i===0?(o.notes||""):""])});}});});
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`alidesk-${todayStr()}.csv`;a.click();URL.revokeObjectURL(url);setShowExport(false);
  };

  if(!ready)return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#111827" }}>Loading AliDesk…</div>;

  const company=selectedCompany?companies.find(c=>c.id===selectedCompany):null;

  const SIDEBAR_W = 240;

  const NavItems = ({vertical}) => (
    <>{NAV.map(n=>{
      const Icon=NAV_ICONS[n.id];
      const active=nav===n.id;
      if(vertical) return (
        <button key={n.id} onClick={()=>{setNav(n.id);setSelectedCompany(null);setDashFilter(null);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",background:active?"rgba(74,222,128,0.12)":"none",border:"none",cursor:"pointer",padding:"11px 16px",borderRadius:10,fontFamily:"inherit",position:"relative",marginBottom:2}}>
          {active&&<div style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",width:3,height:32,background:"#4ADE80",borderRadius:"0 4px 4px 0"}} />}
          <Icon color={active?"#4ADE80":"rgba(255,255,255,0.85)"} size={22}/>
          <span style={{fontWeight:active?700:400,color:active?"#4ADE80":"white",letterSpacing:0.1}}>{n.label}</span>
        </button>
      );
      return (
        <button key={n.id} onClick={()=>{setNav(n.id);setSelectedCompany(null);setDashFilter(null);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"12px 4px 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:4,fontFamily:"inherit",position:"relative",minWidth:0}}>
          {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,background:"#4ADE80",borderRadius:"0 0 4px 4px"}} />}
          {active?<div style={{background:"rgba(74,222,128,0.15)",borderRadius:9,padding:"5px 8px"}}><Icon color="#4ADE80" size={28}/></div>:<Icon color="rgba(255,255,255,0.85)" size={28}/>}
          <span style={{fontWeight:active?700:500,color:active?"#4ADE80":"rgba(255,255,255,0.9)",letterSpacing:0.3,textTransform:"uppercase",textAlign:"center",marginTop:2,fontFamily:"inherit",display:"block"}}>{n.label}</span>
        </button>
      );
    })}</>
  );

  const contentArea = (
    <div style={{flex:1,overflowY:"auto",padding:"20px 24px 40px",background:"#F0F4F8",minWidth:0,height:"100vh"}}>
      {nav==="dashboard"&&<Dashboard companies={companies} budgets={budgets} onGo={goTo} />}
      {nav==="ideas"&&<Ideas ideas={ideas} setIdeas={setIdeas} allCategories={categories} />}
      {nav==="companies"&&!company&&<CompanyList companies={companies} onSelect={id=>setSelectedCompany(id)} onAdd={()=>setAddCompanyModal(true)} onImport={()=>setShowImport(true)} onBulkDelete={ids=>{setCompanies(cs=>cs.filter(c=>!ids.includes(c.id)));}} initialFilter={dashFilter} onClearFilter={()=>setDashFilter(null)} />}
      {nav==="companies"&&company&&<CompanyDetail company={company} onUpdate={updateCompany} onBack={()=>setSelectedCompany(null)} allCategories={categories} />}
      {nav==="orders"&&<Orders companies={companies} allCategories={categories} onUpdate={updateCompany} initialFilter={dashFilter} onClearFilter={()=>setDashFilter(null)} />}
      {nav==="tracking"&&<TrackingPage companies={companies} onGo={goTo} />}
      {nav==="pricing"&&<PricingTool />}
      {nav==="tasks"&&<TasksView companies={companies} onUpdateCompany={updateCompany} onGoToCompany={id=>{setNav("companies");setSelectedCompany(id);}} />}
      {nav==="contacts"&&<ContactsCRM companies={companies} onGoToCompany={id=>{setNav("companies");setSelectedCompany(id);}} />}
      {nav==="budget"&&<Budget budgets={budgets} onUpdate={b=>setBudgets(bs=>bs.map(x=>x.id===b.id?b:x))} onAdd={b=>setBudgets(bs=>[...bs,b])} onDelete={id=>setBudgets(bs=>bs.filter(b=>b.id!==id))} allCategories={categories} onAddCategory={c=>setCategories(cs=>[...cs,c])} />}
      {nav==="research"&&<ResearchBoard items={researchItems} setItems={setResearchItems} companies={companies} allCategories={categories} onAddCategory={c=>setCategories(cs=>[...cs,c])} />}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#F8FAFC",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif"}}>

      {/* DESKTOP LAYOUT */}
      <div className="desktop-layout" style={{display:"none"}}>
        <div style={{display:"flex",height:"100vh",background:"#F0F4F8"}}>
          {/* Sidebar */}
          <div style={{width:SIDEBAR_W,background:"#1E2E4F",display:"flex",flexDirection:"column",flexShrink:0,height:"100vh",position:"sticky",top:0}}>
            {/* Logo */}
            <div style={{padding:"28px 20px 20px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
              <Row gap={10} style={{alignItems:"center"}}>
                <div style={{width:38,height:38,background:"rgba(255,255,255,0.15)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="22" height="18" viewBox="0 0 46 38">
                    <path d="M8 30 Q23 2 38 30" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="1.5"/>
                    <circle cx="8" cy="30" r="5" fill="white" opacity="0.45"/>
                    <circle cx="23" cy="10" r="8" fill="#4ADE80"/>
                    <circle cx="38" cy="30" r="5" fill="white" opacity="0.45"/>
                    <circle cx="23" cy="10" r="3.5" fill="white"/>
                  </svg>
                </div>
                <div>
                  <div style={{fontWeight:800,color:"white",letterSpacing:-0.5,lineHeight:1.1,fontSize:26}}>AliDeskPro</div>
                  <div style={{color:"#4ADE80",letterSpacing:2,fontWeight:600,fontSize:12}}>SUPPLIER CRM</div>
                </div>
              </Row>
            </div>
            {/* Nav items */}
            <div style={{flex:1,padding:"20px 16px",overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
              <NavItems vertical={true}/>
            </div>
            {/* Bottom status */}
            <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
              {waitingOnMe>0&&<div style={{background:"rgba(55,65,81,0.8)",borderRadius:7,padding:"6px 10px",color:"white",fontWeight:600,marginBottom:6}}>👋 {waitingOnMe} need reply</div>}
              {overdueCt>0&&<button onClick={()=>setNav("tasks")} style={{width:"100%",background:"rgba(239,68,68,0.8)",border:"none",borderRadius:7,padding:"6px 10px",color:"white",fontWeight:600,marginBottom:6,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontSize:"inherit"}}>⚠ {overdueCt} Overdue Task{overdueCt===1?"":"s"}</button>}
              <button onClick={()=>setShowExport(true)} style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 12px",color:"rgba(255,255,255,0.92)",fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>⬇ Export</button>
            </div>
          </div>
          {/* Main content */}
          {contentArea}
        </div>
      </div>

      {/* MOBILE LAYOUT */}
      <div className="mobile-layout">
        {/* Mobile top bar */}
        <div style={{position:"sticky",top:0,zIndex:100,background:"#2C3E6B",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <Row gap={10}>
            <div style={{width:30,height:30,background:"rgba(255,255,255,0.15)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <svg width="18" height="14" viewBox="0 0 46 38">
                <path d="M8 30 Q23 2 38 30" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="1.5"/>
                <circle cx="8" cy="30" r="5" fill="white" opacity="0.45"/>
                <circle cx="23" cy="10" r="8" fill="#4ADE80"/>
                <circle cx="38" cy="30" r="5" fill="white" opacity="0.45"/>
                <circle cx="23" cy="10" r="3.5" fill="white"/>
              </svg>
            </div>
            <span style={{fontWeight:800,color:"white",letterSpacing:-0.5,fontSize:"1em"}}>AliDeskPro</span>
          </Row>
          <Row gap={6}>
            {waitingOnMe>0&&<div style={{background:"#1F2937",borderRadius:99,padding:"3px 9px",color:"white",fontWeight:600,fontSize:"0.75em"}}>👋 {waitingOnMe}</div>}
            {overdueCt>0&&<div style={{background:"#EF4444",borderRadius:99,padding:"3px 9px",color:"white",fontWeight:600,fontSize:"0.75em"}}>⚠ {overdueCt}</div>}
          </Row>
        </div>
        {/* Mobile nav - horizontal scrollable icon row at top */}
        <div style={{background:"#2C3E6B",borderBottom:"1px solid rgba(255,255,255,0.1)",overflowX:"auto",display:"flex",padding:"4px 8px 8px"}}>
          {NAV.map(n=>{
            const Icon=NAV_ICONS[n.id];
            const active=nav===n.id;
            return (
              <button key={n.id} onClick={()=>{setNav(n.id);setSelectedCompany(null);setDashFilter(null);}} style={{flex:"0 0 auto",background:"none",border:"none",cursor:"pointer",padding:"6px 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit",position:"relative",minWidth:60}}>
                {active&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:"#4ADE80",borderRadius:"2px 2px 0 0"}} />}
                <Icon color={active?"#4ADE80":"rgba(255,255,255,0.7)"} size={22}/>
                <span style={{fontSize:"0.6em",fontWeight:active?700:500,color:active?"#4ADE80":"rgba(255,255,255,0.8)",letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{n.label}</span>
              </button>
            );
          })}
        </div>
        {/* Mobile content */}
        <div style={{padding:"16px 16px 40px",background:"#F8FAFC",minHeight:"100vh"}}>
          {nav==="dashboard"&&<Dashboard companies={companies} budgets={budgets} onGo={goTo} />}
          {nav==="ideas"&&<Ideas ideas={ideas} setIdeas={setIdeas} allCategories={categories} />}
          {nav==="companies"&&!company&&<CompanyList companies={companies} onSelect={id=>setSelectedCompany(id)} onAdd={()=>setAddCompanyModal(true)} onImport={()=>setShowImport(true)} onBulkDelete={ids=>{setCompanies(cs=>cs.filter(c=>!ids.includes(c.id)));}} initialFilter={dashFilter} onClearFilter={()=>setDashFilter(null)} />}
          {nav==="companies"&&company&&<CompanyDetail company={company} onUpdate={updateCompany} onBack={()=>setSelectedCompany(null)} allCategories={categories} />}
          {nav==="orders"&&<Orders companies={companies} allCategories={categories} onUpdate={updateCompany} initialFilter={dashFilter} onClearFilter={()=>setDashFilter(null)} />}
          {nav==="tracking"&&<TrackingPage companies={companies} onGo={goTo} />}
          {nav==="pricing"&&<PricingTool />}
          {nav==="tasks"&&<TasksView companies={companies} onUpdateCompany={updateCompany} onGoToCompany={id=>{setNav("companies");setSelectedCompany(id);}} />}
          {nav==="contacts"&&<ContactsCRM companies={companies} onGoToCompany={id=>{setNav("companies");setSelectedCompany(id);}} />}
          {nav==="budget"&&<Budget budgets={budgets} onUpdate={b=>setBudgets(bs=>bs.map(x=>x.id===b.id?b:x))} onAdd={b=>setBudgets(bs=>[...bs,b])} onDelete={id=>setBudgets(bs=>bs.filter(b=>b.id!==id))} allCategories={categories} onAddCategory={c=>setCategories(cs=>[...cs,c])} />}
          {nav==="research"&&<ResearchBoard items={researchItems} setItems={setResearchItems} companies={companies} allCategories={categories} onAddCategory={c=>setCategories(cs=>[...cs,c])} />}
        </div>
      </div>

      {showImport&&<ImportVendorsModal onImport={(vs)=>{vs.forEach(v=>setCompanies(cs=>[...cs,v]));setShowImport(false);}} onClose={()=>setShowImport(false)} allCategories={categories} />}
      {addCompanyModal&&<AddCompanyModal onAdd={c=>{addCompany(c);setAddCompanyModal(false);setNav("companies");}} allCategories={categories} onClose={()=>setAddCompanyModal(false)} />}

      {showExport&&(
        <div style={{ position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center" }} onClick={e=>e.target===e.currentTarget&&setShowExport(false)}>
          <div style={{ background:"white",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,padding:24,display:"flex",flexDirection:"column",gap:12 }}>
            <T size={16} weight={700} color="#111827" style={{ display:"block" }}>Export & Backup</T>
            <T size={13} color="#111827" style={{ display:"block",lineHeight:1.6 }}>Download a copy of your data. Store it in Google Drive or email it to yourself. Photos and PDFs excluded to keep file sizes manageable.</T>
            <button onClick={exportCSV} style={{ display:"flex",alignItems:"center",gap:12,background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:12,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%" }}>
              <div style={{ width:36,height:36,background:"#2563EB",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}><span style={{ fontSize:18 }}>📊</span></div>
              <div><T size={13} weight={700} color="#111827" style={{ display:"block" }}>Download CSV</T><T size={13} color="#111827">All companies, orders and line items. Open in Excel or Google Sheets.</T></div>
            </button>
            <button onClick={exportJSON} style={{ display:"flex",alignItems:"center",gap:12,background:"#F8FAFC",border:"1.5px solid #E2E8F0",borderRadius:12,padding:"14px 16px",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%" }}>
              <div style={{ width:36,height:36,background:"#7C3AED",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}><span style={{ fontSize:18 }}>🗂</span></div>
              <div><T size={13} weight={700} color="#111827" style={{ display:"block" }}>Full Backup (JSON)</T><T size={13} color="#111827">Everything — contacts, conversations, tasks, budgets, ideas.</T></div>
            </button>
            <div style={{ background:"#F59E0B",borderRadius:9,padding:"10px 14px" }}>
              <T size={13} color="white" style={{ lineHeight:1.6 }}>💡 <T size={13} weight={700} color="white">Tip:</T> Export monthly and save to Google Drive named like <T size={13} mono color="white">alidesk-2025-06.json</T></T>
            </div>
            <button onClick={()=>setShowExport(false)} style={{ background:"none",border:"1px solid #E5E7EB",borderRadius:10,padding:"10px",cursor:"pointer",fontFamily:"inherit",color:"#111827",fontWeight:500 }}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
